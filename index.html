<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auror Field Scanner: Ultimate</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1110">
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">

    <style>
        :root { --ministry-red: #5c0011; --ministry-gold: #cfa052; --parchment-light: #fdf5e6; --ink-black: #1a1110; }
        body, html { margin: 0; padding: 0; height: 100%; background-color: var(--ink-black); font-family: 'IM Fell English', serif; overflow: hidden; user-select: none; color: var(--ink-black); }
        h1, h2, h3 { font-weight: normal; margin: 0; text-align: center; }

        .parchment-bg {
            background-color: #e8dcc4;
            background-image: radial-gradient(circle at 10% 20%, rgba(139, 69, 19, 0.08) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(139, 69, 19, 0.12) 0%, transparent 50%);
            box-shadow: inset 0 0 60px rgba(43, 0, 0, 0.6);
        }

        /* Camera & Effects */
        #video-container { position: relative; width: 100vw; height: 100vh; display: none; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.95); pointer-events: none; z-index: 5; }
        #mist { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%); animation: driftMist 20s infinite alternate ease-in-out; pointer-events: none; z-index: 6; filter: blur(10px); }
        @keyframes driftMist { 0% { transform: translate(0, 0); } 100% { transform: translate(15%, 15%); } }
        
        .shake { animation: cameraShake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes cameraShake { 10%, 90% { transform: translate3d(-5px, 0, 0); } 20%, 80% { transform: translate3d(5px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-10px, 0, 0); } 40%, 60% { transform: translate3d(10px, 0, 0); } }
        
        #cracked-glass { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 50 L10 10 M50 50 L90 20 M50 50 L30 90 M50 50 L80 80" stroke="white" stroke-width="0.5" opacity="0.7"/></svg>'); background-size: cover; z-index: 110; display: none; pointer-events: none; }

        /* UI */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 40px 15px; box-sizing: border-box; z-index: 10; pointer-events: none; }
        .top-bar { display: flex; justify-content: space-between; width: 100%; pointer-events: auto; }
        .leather-panel { background: rgba(26, 17, 16, 0.85); border: 2px solid var(--ministry-gold); padding: 12px; border-radius: 6px; display: flex; flex-direction: column; color: var(--parchment-light); box-shadow: 0 4px 10px rgba(0,0,0,0.8); }
        .ministry-btn-small { background: var(--ministry-red); border: 1px solid var(--ministry-gold); color: var(--parchment-light); padding: 8px 12px; border-radius: 4px; font-family: inherit; font-size: 1rem; cursor: pointer; margin-bottom: 5px;}
        
        #status-text { color: var(--parchment-light); font-size: 1.3rem; background: rgba(26, 17, 16, 0.85); padding: 10px 25px; border-radius: 6px; border: 1px solid var(--ministry-gold); pointer-events: auto; }
        .cast-btn { pointer-events: auto; background: radial-gradient(circle, #7a0016, #4a000d); border: 2px solid var(--ministry-gold); color: var(--parchment-light); font-family: inherit; font-size: 1.6rem; padding: 15px 40px; border-radius: 40px; cursor: pointer; box-shadow: 0 8px 15px rgba(0,0,0,0.8); margin-top: 15px; }
        
        #map-btn { position: absolute; bottom: 120px; right: 20px; width: 60px; height: 60px; background: #e8dcc4; border: 2px dashed #5c0011; border-radius: 5px; font-size: 2rem; display: flex; justify-content: center; align-items: center; pointer-events: auto; cursor: pointer; box-shadow: 0 4px 8px #000; }

        /* Modals */
        .modal-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: 25px; box-sizing: border-box; }
        select { font-family: inherit; font-size: 1.2rem; background: transparent; border: 1px solid var(--ink-black); padding: 5px; margin-bottom: 30px; }
        #proof-image { width: 100%; max-height: 70%; object-fit: contain; box-shadow: 0 10px 30px rgba(0,0,0,0.9); margin-bottom: 20px; border: 4px solid var(--ink-black); transition: transform 0.1s ease-out; }

        /* Duel */
        #duel-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: space-between; align-items: center; padding: 50px 10px; box-sizing: border-box; z-index: 15; }
        #duel-title { color: #ff3333; font-size: 2.2rem; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 8px; border: 1px solid #ff3333; text-align: center; }
        #wizard-aura { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 120px; height: 120px; border-radius: 50%; box-shadow: 0 0 100px currentColor, inset 0 0 60px currentColor; background: radial-gradient(circle, currentColor 20%, transparent 70%); animation: pulseAura 0.5s infinite alternate; filter: blur(8px); opacity: 0; transition: opacity 0.3s; pointer-events:none;}
        @keyframes pulseAura { 0% { transform: translate(-50%, -50%) scale(1); } 100% { transform: translate(-50%, -50%) scale(1.3); } }
        
        .duel-controls { display: flex; justify-content: space-around; width: 100%; margin-bottom: 30px; pointer-events: auto;}
        .spell-btn { border: 2px solid #fff; border-radius: 50%; width: 70px; height: 70px; font-size: 2rem; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .btn-red { background: radial-gradient(circle, #ff4d4d, #990000); } .btn-green { background: radial-gradient(circle, #4dff4d, #006600); transform: translateY(-20px); } .btn-blue { background: radial-gradient(circle, #4da6ff, #000099); }
        #particle-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; }
        
        /* Marauder's Map */
        #map-screen { display: none; background: #e8dcc4; background-image: radial-gradient(circle at 50% 50%, rgba(139, 69, 19, 0.05) 0%, transparent 80%); overflow: hidden; z-index: 120; }
        #map-content { position: absolute; top: 50%; left: 50%; width: 200vw; height: 200vh; transform-origin: center center; transition: transform 0.1s linear; display: flex; justify-content: center; align-items: center; }
        .footprints { position: absolute; font-size: 2rem; color: #5c0011; opacity: 0.7; transition: all 1s; text-align: center; font-family: inherit; font-size: 1rem; }
    </style>
</head>
<body>

<div id="profile-screen" class="modal-screen parchment-bg">
    <h1>Ministry Registry</h1>
    <input type="text" id="agent-input" style="background:transparent; border:none; border-bottom:2px dashed var(--ministry-red); font-family:inherit; font-size:1.8rem; text-align:center; margin: 20px 0; outline:none;" placeholder="Enter Name">
    <h3>Select Wand Core:</h3>
    <select id="wand-core">
        <option value="dragon">Dragon Heartstring (Powerful Blasts)</option>
        <option value="phoenix">Phoenix Feather (Second Chance in Duel)</option>
        <option value="unicorn">Unicorn Hair (Enhanced Map Tracking)</option>
    </select>
    <button id="login-btn" class="cast-btn">Bind Wand</button>
</div>

<div id="briefing-screen" class="modal-screen parchment-bg" style="display:none;">
    <div id="briefing-text" style="font-size: 1.4rem; line-height: 1.5; flex-grow: 1; overflow-y: auto;"></div>
    <button id="accept-btn" class="cast-btn">Begin Patrol</button>
</div>

<div id="map-screen" class="modal-screen">
    <h2 style="position:absolute; top:20px; color:#5c0011; z-index:10;">Marauder's Map</h2>
    <div id="map-content">
        </div>
    <button id="close-map-btn" class="ministry-btn-small" style="position:absolute; bottom:30px; font-size:1.5rem; padding:15px;">Mischief Managed</button>
</div>

<div id="video-container">
    <div class="vignette"></div><div id="mist"></div>
    <div id="cracked-glass"></div>
    <video id="camera" autoplay playsinline></video>
    
    <div id="ui-layer">
        <div class="top-bar">
            <div class="leather-panel">
                <span id="agent-name-display">AUROR: ???</span>
                <span id="agent-rank-display">Rank: Apprentice | Core: ???</span>
            </div>
            <div>
                <button id="gallery-btn" class="ministry-btn-small">THE LEDGER</button><br>
                <button id="lumos-btn" class="ministry-btn-small" style="background:#000; color:#fff;">LUMOS</button>
            </div>
        </div>
        <div id="map-btn">📜</div>
        <div style="display: flex; flex-direction: column; align-items: center;">
            <div id="status-text">Trace Charm Active</div>
            <button id="scan-btn" class="cast-btn">Cast Revelio</button>
        </div>
    </div>

    <div id="duel-layer">
        <div id="duel-title">Defend Yourself!</div>
        <div id="wizard-aura"></div>
        <div style="width: 100%; text-align: center; pointer-events:auto;">
            <p style="color: #fff; font-size: 1.2rem; text-shadow: 0 0 5px #000; margin-bottom: 10px;">Say: EXPELLIARMUS (Red) | IMPEDIMENTA (Green) | STUPEFY (Blue)<br>Or Swipe: UP (Red) | RIGHT (Blue) | DOWN (Green)</p>
            <div class="duel-controls">
                <div class="spell-btn btn-red" onclick="castCounterSpell('#ff4d4d')"></div>
                <div class="spell-btn btn-green" onclick="castCounterSpell('#4dff4d')"></div>
                <div class="spell-btn btn-blue" onclick="castCounterSpell('#4da6ff')"></div>
            </div>
        </div>
    </div>
</div>

<canvas id="particle-canvas"></canvas>

<div id="proof-screen" class="modal-screen parchment-bg" style="display:none;">
    <h1 style="color:var(--ministry-red); font-size: 2.2rem; margin-bottom:15px;">Wizard Apprehended</h1>
    <img id="proof-image" src="" alt="Azkaban Mugshot">
    <button id="dismiss-btn" class="cast-btn">Dispatch to Azkaban</button>
</div>

<div id="gallery-screen" class="modal-screen parchment-bg" style="display:none;">
    <h1 style="color:var(--ministry-red); font-size: 2.2rem; margin-bottom: 15px;">Holding Cells</h1>
    <div id="gallery-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; overflow-y: auto; max-height: 60vh;"></div>
    <button id="close-gallery-btn" class="cast-btn" style="margin-top:20px;">Resume Patrol</button>
</div>

<canvas id="canvas-processor" style="display:none;"></canvas>

<script>
    // --- STATE VARIABLES ---
    const data_names = ["Gloom Hilda", "Malus Darkweaver", "Vex Blackwood", "Morwenna Shadowcast", "Grimble the Foul", "Silas Nightshade", "Blighted Barnaby", "Hexen Hearthbane", "Seraphina Snake-Eye", "Corvus Spellbound"];
    const data_crimes = ["Transfiguring Muggles", "Cursing the Wi-Fi", "Theft of Time-Turners", "Enchanting Biting Brooms", "Forging Prophecies", "Attempting to transfigure a miniature schnauzer", "Stealing Fowzer's treats", "Bewitching teapot spouts", "Illegal levitation of livestock"];
    
    let audioCtx, currentAgent = "", wandCore = "", intelDatabase = [], capturesCount = 0;
    let forceWizard = false, parentTarget = "", isBoss = false, secondChanceUsed = false, lumosActive = false;
    let successfulCounters = 0, requiredCounters = 3, currentWizardColor = '';
    const spellColors = {'#ff4d4d': 'red', '#4dff4d': 'green', '#4da6ff': 'blue'};

    // DOM Elements
    const video = document.getElementById('camera'), statusText = document.getElementById('status-text');
    const scanBtn = document.getElementById('scan-btn'), duelLayer = document.getElementById('duel-layer'), wizardAura = document.getElementById('wizard-aura');
    const particleCanvas = document.getElementById('particle-canvas'), ctxParticles = particleCanvas.getContext('2d');
    const mapScreen = document.getElementById('map-screen'), mapContent = document.getElementById('map-content');
    
    // Resize Canvas
    window.addEventListener('resize', () => { particleCanvas.width = window.innerWidth; particleCanvas.height = window.innerHeight; });
    particleCanvas.width = window.innerWidth; particleCanvas.height = window.innerHeight;

    // --- AUDIO ---
    function playSound(type) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'zap') { osc.type = 'square'; osc.frequency.setValueAtTime(1200, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.15); gain.gain.setValueAtTime(0.4, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15); osc.start(); osc.stop(audioCtx.currentTime + 0.15); }
        else if (type === 'escape') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.8); gain.gain.setValueAtTime(1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8); osc.start(); osc.stop(audioCtx.currentTime + 0.8); }
        else if (type === 'capture') { osc.type = 'triangle'; osc.frequency.setValueAtTime(440, audioCtx.currentTime); osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.2); osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.4); gain.gain.setValueAtTime(0.6, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5); osc.start(); osc.stop(audioCtx.currentTime + 1.5); }
    }

    // --- SPEECH RECOGNITION (Voice Spells & Map) ---
    let recognition;
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = false;
        recognition.onresult = (event) => {
            const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
            console.log("Heard: " + transcript);
            
            // Map Voice Activation
            if (transcript.includes("solemnly swear") || transcript.includes("up to no good")) {
                openMap();
            }
            
            // Voice Spells during Duel
            if (duelLayer.style.display === 'flex') {
                if (transcript.includes("expelliarmus") || transcript.includes("red")) castCounterSpell('#ff4d4d');
                else if (transcript.includes("stupefy") || transcript.includes("blue")) castCounterSpell('#4da6ff');
                else if (transcript.includes("impedimenta") || transcript.includes("green")) castCounterSpell('#4dff4d');
            }
        };
        recognition.onend = () => { if(document.getElementById('video-container').style.display === 'block') recognition.start(); }; // Restart if closed
    }

    // --- GESTURE CONTROLS ---
    let touchStartX = 0, touchStartY = 0;
    duelLayer.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; touchStartY = e.changedTouches[0].screenY; });
    duelLayer.addEventListener('touchend', e => {
        let dX = e.changedTouches[0].screenX - touchStartX, dY = e.changedTouches[0].screenY - touchStartY;
        if (Math.abs(dX) > 50 || Math.abs(dY) > 50) {
            if (Math.abs(dY) > Math.abs(dX) && dY < 0) castCounterSpell('#ff4d4d'); // Swipe UP = Red
            else if (Math.abs(dX) > Math.abs(dY) && dX > 0) castCounterSpell('#4da6ff'); // Swipe RIGHT = Blue
            else if (Math.abs(dY) > Math.abs(dX) && dY > 0) castCounterSpell('#4dff4d'); // Swipe DOWN = Green
        }
    });

    // --- GYROSCOPE (Map Rotation & Photo Parallax) ---
    function requestOrientation() {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(r => { if (r === 'granted') startGyro(); }).catch(console.error);
        } else startGyro();
    }
    
    function startGyro() {
        window.addEventListener('deviceorientation', (e) => {
            // Parallax Mugshot
            if (document.getElementById('proof-screen').style.display === 'flex') {
                document.getElementById('proof-image').style.transform = `perspective(500px) rotateY(${e.gamma/3}deg) rotateX(${e.beta/3 - 15}deg)`;
            }
            // Marauder's Map Rotation
            if (mapScreen.style.display === 'flex' && e.webkitCompassHeading) {
                mapContent.style.transform = `rotate(${-e.webkitCompassHeading}deg)`;
            } else if (mapScreen.style.display === 'flex' && e.alpha) {
                mapContent.style.transform = `rotate(${e.alpha}deg)`;
            }
        });
    }

    // --- LUMOS (Flashlight/Screen Brightness) ---
    document.getElementById('lumos-btn').addEventListener('click', async () => {
        lumosActive = !lumosActive;
        // Attempt native torch
        try {
            const track = video.srcObject.getVideoTracks()[0];
            await track.applyConstraints({ advanced: [{ torch: lumosActive }] });
        } catch (e) {
            // Fallback CSS Lumos
            document.getElementById('mist').style.background = lumosActive ? 'radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 80%)' : 'radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%)';
        }
    });

    // --- SECRET MINISTER MENU ---
    let menuTaps = 0;
    statusText.addEventListener('click', () => {
        menuTaps++;
        if (menuTaps >= 5) {
            menuTaps = 0;
            let pwd = prompt("Enter Minister Password:");
            if (pwd && pwd.toLowerCase() === "alohomora") {
                parentTarget = prompt("Enter specific name for next scan (or leave blank):");
                isBoss = confirm("Trigger Co-Op Boss Battle on next scan?");
                alert("Mischief Managed.");
            }
        }
    });

    // --- INITIALIZATION ---
    document.getElementById('login-btn').addEventListener('click', () => {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        currentAgent = document.getElementById('agent-input').value.toUpperCase();
        wandCore = document.getElementById('wand-core').value;
        intelDatabase = JSON.parse(localStorage.getItem(`wizardIntel_${currentAgent}`)) || [];
        capturesCount = intelDatabase.length;
        
        document.getElementById('agent-name-display').innerText = currentAgent;
        document.getElementById('agent-rank-display').innerText = `Core: ${wandCore} | Captures: ${capturesCount}`;
        
        document.getElementById('profile-screen').style.display = 'none';
        document.getElementById('briefing-screen').style.display = 'flex';
        document.getElementById('briefing-text').innerText = "Speak 'I solemnly swear that I am up to no good' to view the map.\n\nDuring a duel, shout EXPELLIARMUS (Red), IMPEDIMENTA (Green), or STUPEFY (Blue), or use screen swipes to counter!";
    });

    document.getElementById('accept-btn').addEventListener('click', () => {
        requestOrientation();
        if(recognition) { try { recognition.start(); } catch(e){} }
        document.getElementById('briefing-screen').style.display = 'none';
        document.getElementById('video-container').style.display = 'block';
        navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}}).then(s => video.srcObject = s);
    });

    // --- MARAUDER's MAP LOGIC ---
    document.getElementById('map-btn').addEventListener('click', () => {
        alert("Mr. Moony presents his compliments and begs you to keep your abnormally large nose out of other people's business. (Try speaking the passcode, or Long-Press this button!)");
    });
    
    // Fallback Long-Press for Map
    let mapTimer;
    document.getElementById('map-btn').addEventListener('touchstart', () => { mapTimer = setTimeout(openMap, 1500); });
    document.getElementById('map-btn').addEventListener('touchend', () => { clearTimeout(mapTimer); });

    function openMap() {
        mapScreen.style.display = 'flex';
        mapContent.innerHTML = '<div style="position:absolute; width:10px; height:10px; background:red; border-radius:50%;"></div>'; // You are here
        
        // Generate random wandering footprints
        let numPrints = wandCore === 'unicorn' ? 5 : 3;
        for(let i=0; i<numPrints; i++) {
            let p = document.createElement('div');
            p.className = 'footprints';
            p.innerText = "👣 " + data_names[Math.floor(Math.random()*data_names.length)];
            p.style.top = (Math.random() * 150 + 25) + "vh";
            p.style.left = (Math.random() * 150 + 25) + "vw";
            mapContent.appendChild(p);
            
            // Wander
            setInterval(() => {
                p.style.top = (parseFloat(p.style.top) + (Math.random()*10 - 5)) + "vh";
                p.style.left = (parseFloat(p.style.left) + (Math.random()*10 - 5)) + "vw";
            }, 2000);
        }
    }
    document.getElementById('close-map-btn').addEventListener('click', () => { mapScreen.style.display = 'none'; });

    // --- LIVE DUEL MECHANICS ---
    let particlesList = [];
    function animateParticles() {
        ctxParticles.clearRect(0,0, particleCanvas.width, particleCanvas.height);
        for(let i=particlesList.length-1; i>=0; i--) {
            let p = particlesList[i];
            p.x += p.vx; p.y += p.vy; p.life -= 0.03;
            if(p.life <= 0) { particlesList.splice(i, 1); continue; }
            ctxParticles.globalAlpha = p.life; ctxParticles.fillStyle = p.color;
            ctxParticles.beginPath(); ctxParticles.arc(p.x, p.y, p.size, 0, Math.PI*2); ctxParticles.fill();
        }
        ctxParticles.globalAlpha = 1.0;
        requestAnimationFrame(animateParticles);
    }
    animateParticles();

    scanBtn.addEventListener('click', () => {
        scanBtn.disabled = true; statusText.innerText = "Casting Revelio...";
        setTimeout(() => {
            if (forceWizard || parentTarget || isBoss || Math.random() < 0.2) {
                forceWizard = false;
                startDuel(); 
            } else {
                statusText.innerText = "Muggle Detected"; 
                setTimeout(() => { statusText.innerText = "Trace Charm Active"; scanBtn.disabled = false; }, 2000);
            }
        }, 1500); 
    });

    function startDuel() {
        document.getElementById('ui-layer').style.display = 'none'; 
        duelLayer.style.display = 'flex'; 
        successfulCounters = 0;
        secondChanceUsed = false;
        
        // Co-Op Boss Logic
        if (isBoss || capturesCount > 0 && capturesCount % 10 === 0) {
            requiredCounters = 6;
            document.getElementById('duel-title').innerText = "ELITE BOSS! PREPARE TO PASS WAND!";
            document.getElementById('duel-title').style.color = "#ff00ff";
        } else {
            requiredCounters = 3;
            document.getElementById('duel-title').innerText = "Defend Yourself!";
            document.getElementById('duel-title').style.color = "#ff3333";
        }
        
        setTimeout(wizardAttack, 1000); 
    }

    function wizardAttack() {
        const keys = Object.keys(spellColors);
        currentWizardColor = keys[Math.floor(Math.random() * keys.length)];
        wizardAura.style.color = currentWizardColor;
        wizardAura.style.opacity = '1';
    }

    window.castCounterSpell = function(playerColor) {
        if (wizardAura.style.opacity === '0') return; 
        playSound('zap');
        
        // Particle Burst (Dragon Core gets double)
        let count = wandCore === 'dragon' ? 100 : 40;
        for(let i=0; i<count; i++) {
            particlesList.push({
                x: window.innerWidth/2, y: window.innerHeight - 100,
                vx: (Math.random()-0.5)*15, vy: (Math.random()*-20)-5,
                life: 1.0, color: playerColor, size: Math.random()*6+2
            });
        }
        
        setTimeout(() => {
            if (playerColor === currentWizardColor) {
                successfulCounters++;
                wizardAura.style.opacity = '0'; 
                
                // Co-Op Pass Wand Mechanic
                if (requiredCounters === 6 && successfulCounters === 3) {
                    document.getElementById('duel-title').innerText = "WAND OVERHEATING! PASS TO ANOTHER AUROR!";
                    setTimeout(wizardAttack, 3000); // 3 seconds to pass phone
                    return;
                }

                if (successfulCounters >= requiredCounters) winDuel();
                else {
                    document.getElementById('duel-title').innerText = `Blocked! (${successfulCounters}/${requiredCounters})`;
                    setTimeout(wizardAttack, 800); 
                }
            } else {
                if(wandCore === 'phoenix' && !secondChanceUsed) {
                    secondChanceUsed = true;
                    document.getElementById('duel-title').innerText = "PHOENIX TEARS SAVED YOU! TRY AGAIN!";
                    setTimeout(wizardAttack, 1500);
                } else loseDuel();
            }
        }, 200); 
    };

    function winDuel() {
        playSound('capture');
        generateAzkabanMugshot();
        duelLayer.style.display = 'none';
        document.getElementById('ui-layer').style.display = 'flex';
        wizardAura.style.opacity = '0';
        document.getElementById('proof-screen').style.display = 'flex';
        isBoss = false; // Reset boss
    }

    function loseDuel() {
        playSound('escape');
        document.getElementById('video-container').classList.add('shake');
        document.getElementById('cracked-glass').style.display = 'block';
        document.getElementById('duel-title').innerText = "Apparated Away!";
        wizardAura.style.opacity = '0';
        
        setTimeout(() => {
            document.getElementById('video-container').classList.remove('shake');
            document.getElementById('cracked-glass').style.display = 'none';
            duelLayer.style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            statusText.innerText = "Target Lost";
            setTimeout(() => { statusText.innerText = "Trace Charm Active"; scanBtn.disabled = false; }, 2000);
        }, 1500);
    }

    function generateAzkabanMugshot() {
        const c = document.getElementById('canvas-processor');
        c.width = video.videoWidth; c.height = video.videoHeight;
        const w = c.width, h = c.height;
        
        ctx.filter = 'sepia(100%) contrast(140%) grayscale(20%) brightness(85%)';
        ctx.drawImage(video, 0, 0, w, h);
        ctx.filter = 'none'; 
        
        const gap = Math.floor(w / 5);
        for(let i = gap/2; i < w; i += gap) {
            ctx.fillStyle = "#222"; ctx.fillRect(i, 0, Math.floor(w*0.05), h);
        }
        
        ctx.fillStyle = "#e8dcc4"; ctx.fillRect(w*0.05, h*0.65, w*0.9, h*0.3); 
        ctx.strokeStyle = "#5c0011"; ctx.lineWidth = 3; ctx.strokeRect(w*0.05+5, h*0.65+5, w*0.9-10, h*0.3-10);
        
        ctx.fillStyle = "#1a1110"; ctx.font = `bold ${Math.floor(h*0.04)}px serif`; 
        
        let targetName = parentTarget ? parentTarget : data_names[Math.floor(Math.random() * data_names.length)];
        parentTarget = ""; // Clear
        
        ctx.fillText(`ALIAS: ${targetName}`, w*0.1, h*0.72); 
        ctx.fillText(`CRIME: ${data_crimes[Math.floor(Math.random() * data_crimes.length)]}`, w*0.1, h*0.8); 

        document.getElementById('proof-image').dataset.tempImageData = c.toDataURL('image/jpeg', 0.8);
        document.getElementById('proof-image').src = document.getElementById('proof-image').dataset.tempImageData;
    }

    document.getElementById('dismiss-btn').addEventListener('click', () => {
        intelDatabase.unshift(document.getElementById('proof-image').dataset.tempImageData); 
        localStorage.setItem(`wizardIntel_${currentAgent}`, JSON.stringify(intelDatabase));
        capturesCount = intelDatabase.length;
        document.getElementById('agent-rank-display').innerText = `Core: ${wandCore} | Captures: ${capturesCount}`;
        document.getElementById('proof-screen').style.display = 'none';
        scanBtn.disabled = false; statusText.innerText = "Trace Charm Active";
    });

    // Gallery
    document.getElementById('gallery-btn').addEventListener('click', () => {
        const grid = document.getElementById('gallery-grid'); grid.innerHTML = '';
        intelDatabase.forEach(imgSrc => {
            const img = document.createElement('img'); img.src = imgSrc; img.style.width = "100%"; img.style.border = "2px solid #000";
            grid.appendChild(img);
        });
        document.getElementById('gallery-screen').style.display = 'flex';
    });
    document.getElementById('close-gallery-btn').addEventListener('click', () => document.getElementById('gallery-screen').style.display = 'none' );

</script>
</body>
</html>
