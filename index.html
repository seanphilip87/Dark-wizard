<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auror Field Scanner</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2b0000">
    
    <!-- Official Ministry Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">

    <style>
        :root {
            --ministry-red: #5c0011;
            --ministry-gold: #cfa052;
            --parchment-light: #fdf5e6;
            --parchment-dark: #e8dcc4;
            --ink-black: #1a1110;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; 
            background-color: var(--ink-black);
            font-family: 'IM Fell English', serif; 
            overflow: hidden; user-select: none; -webkit-user-select: none; 
            color: var(--ink-black);
        }

        h1, h2, h3 { font-family: 'Cinzel Decorative', serif; margin: 0; text-align: center; }

        /* Aged Parchment Background for Modals */
        .parchment-bg {
            background-color: var(--parchment-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(139, 69, 19, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(139, 69, 19, 0.15) 0%, transparent 50%),
                linear-gradient(to right, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 20%, rgba(255,255,255,0) 80%, rgba(255,255,255,0.4) 100%);
            box-shadow: inset 0 0 50px rgba(92, 0, 17, 0.3);
        }

        /* The Camera View */
        #video-container { position: relative; width: 100vw; height: 100vh; display: none; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Magical Vignette over Camera */
        .vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 150px rgba(26, 17, 16, 0.95); pointer-events: none; z-index: 7;
        }

        /* Runic Reticle */
        #reticle {
            position: absolute; top: 50%; left: 50%; width: 160px; height: 160px;
            transform: translate(-50%, -50%); border: 2px solid rgba(207, 160, 82, 0.3);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 40px rgba(207, 160, 82, 0.2); transition: opacity 0.3s ease;
        }
        #reticle-inner {
            position: absolute; width: 140px; height: 140px; border: 2px dashed var(--ministry-gold);
            border-radius: 50%; animation: spinReverse 15s linear infinite; opacity: 0.8;
        }
        #reticle-outer {
            position: absolute; top: 50%; left: 50%; width: 190px; height: 190px;
            transform: translate(-50%, -50%); border-left: 3px double var(--ministry-gold); border-right: 3px double var(--ministry-gold);
            border-top: 3px solid transparent; border-bottom: 3px solid transparent;
            border-radius: 50%; animation: spin 10s linear infinite;
        }
        @keyframes spin { 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes spinReverse { 100% { transform: rotate(-360deg); } }

        /* UI Overlays */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between; align-items: center;
            padding: 40px 15px; box-sizing: border-box; z-index: 10; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .top-bar { display: flex; justify-content: space-between; width: 100%; pointer-events: auto; }
        
        .leather-panel {
            background: rgba(43, 0, 0, 0.85); border: 2px solid var(--ministry-gold); padding: 12px 15px;
            border-radius: 4px; display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.6);
        }
        #agent-name-display { font-family: 'Cinzel Decorative', serif; font-size: 1.1rem; color: var(--parchment-light); text-shadow: 1px 1px 2px #000; }
        #agent-rank-display { font-size: 0.9rem; color: var(--ministry-gold); margin-top: 3px; font-style: italic; }
        
        .ministry-btn-small {
            background: var(--ministry-red); border: 2px solid var(--ministry-gold); color: var(--parchment-light);
            padding: 10px 15px; border-radius: 4px; font-family: 'Cinzel Decorative', serif; font-weight: bold;
            cursor: pointer; text-shadow: 1px 1px 2px #000; box-shadow: 0 4px 8px rgba(0,0,0,0.5); font-size: 0.9rem;
        }

        #status-text {
            color: var(--parchment-light); font-size: 1.4rem; font-family: 'Cinzel Decorative', serif;
            background: rgba(43, 0, 0, 0.85); padding: 12px 30px; border-radius: 4px; border: 2px solid var(--ministry-gold); 
            text-shadow: 1px 1px 2px #000; letter-spacing: 1px; box-shadow: 0 4px 10px rgba(0,0,0,0.6);
            transition: all 0.3s ease;
        }
        .muggle-active { background: rgba(200, 180, 140, 0.9) !important; color: var(--ink-black) !important; border-color: var(--ink-black) !important; text-shadow: none !important; }

        .cast-btn {
            pointer-events: auto; background: linear-gradient(135deg, #7a0016, #4a000d);
            border: 3px solid var(--ministry-gold); color: var(--parchment-light); font-family: 'Cinzel Decorative', serif; 
            font-size: 1.6rem; padding: 20px 45px; border-radius: 50px; cursor: pointer; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.6), inset 0 2px 5px rgba(255,255,255,0.2);
            transition: all 0.1s ease; letter-spacing: 2px;
        }
        .cast-btn:active { transform: translateY(4px); box-shadow: 0 4px 8px rgba(0,0,0,0.6); }

        /* MODALS */
        .modal-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; padding: 25px; box-sizing: border-box;
        }

        /* --- LIVE DUEL UI --- */
        #duel-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: space-between; align-items: center;
            padding: 50px 10px; box-sizing: border-box; z-index: 15; pointer-events: none;
        }
        
        #duel-title {
            font-family: 'Cinzel Decorative', serif; color: #ff3333; text-shadow: 0 0 15px #ff0000, 2px 2px 4px #000; 
            font-size: 2.2rem; text-align: center; margin-top: 20px; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 10px;
        }
        
        #wizard-aura {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            width: 140px; height: 140px; border-radius: 50%; opacity: 0;
            box-shadow: 0 0 100px currentColor, inset 0 0 50px currentColor;
            background: radial-gradient(circle, currentColor 10%, transparent 60%);
            transition: opacity 0.3s, color 0.2s; pointer-events: none;
            animation: pulseAura 0.8s infinite alternate; filter: blur(5px);
        }
        @keyframes pulseAura { 0% { transform: translate(-50%, -50%) scale(1); } 100% { transform: translate(-50%, -50%) scale(1.15); } }
        
        .duel-controls { display: flex; justify-content: space-around; width: 100%; margin-bottom: 30px; pointer-events: auto;}
        
        /* Wax Seal Spell Buttons */
        .spell-btn {
            border: 3px solid #ffcc00; border-radius: 50%; width: 85px; height: 85px;
            font-size: 2.5rem; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.6), inset 0 -4px 8px rgba(0,0,0,0.4); 
            cursor: pointer; transition: transform 0.1s;
        }
        .spell-btn:active { transform: scale(0.9) translateY(4px); box-shadow: 0 2px 5px rgba(0,0,0,0.6); }
        .btn-red { color: #fff; background: radial-gradient(circle, #ff3333, #8b0000); }
        .btn-green { color: #fff; background: radial-gradient(circle, #33ff33, #006400); transform: translateY(-25px); }
        .btn-blue { color: #fff; background: radial-gradient(circle, #33ccff, #00008b); }

        #player-spell-blast {
            position: absolute; bottom: 180px; left: 50%; transform: translateX(-50%);
            width: 20px; height: 120px; border-radius: 10px; opacity: 0;
            background: currentColor; box-shadow: 0 0 40px currentColor, 0 0 20px #fff; pointer-events: none;
            transition: bottom 0.15s ease-in, opacity 0.1s;
        }
        #duel-flash { position: absolute; top:0; left:0; width:100%; height:100%; background: #fff; opacity: 0; pointer-events: none; transition: opacity 0.1s; z-index: 110;}

        /* Modals & Inputs */
        #profile-screen h1 { color: var(--ministry-red); font-size: 2.5rem; margin-bottom: 5px; }
        #profile-screen h3 { color: var(--ink-black); font-size: 1.2rem; font-weight: normal; margin-top: 0; margin-bottom: 40px; border-bottom: 1px solid var(--ink-black); padding-bottom: 10px;}
        #agent-input {
            background: transparent; border: none; border-bottom: 2px dashed var(--ministry-red); color: var(--ink-black);
            font-family: 'Cinzel Decorative', serif; font-size: 1.8rem; padding: 10px; text-align: center;
            margin-bottom: 30px; outline: none; width: 85%; text-transform: uppercase;
        }
        #agent-input::placeholder { color: rgba(26, 17, 16, 0.4); }
        
        .ministry-btn-large {
            background: var(--ministry-red); border: 2px solid var(--ministry-gold); color: var(--parchment-light);
            font-family: 'Cinzel Decorative', serif; font-size: 1.4rem; padding: 18px 40px;
            border-radius: 4px; cursor: pointer; box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            letter-spacing: 1px; transition: transform 0.1s;
        }
        .ministry-btn-large:active { transform: translateY(2px); box-shadow: 0 2px 6px rgba(0,0,0,0.5); }
        
        #briefing-screen { display: none; justify-content: flex-start; padding-top: 10vh; }
        #briefing-text { font-size: 1.4rem; line-height: 1.7; margin-bottom: 40px; min-height: 300px; color: var(--ink-black);}
        
        #proof-screen { display: none; }
        /* Daily Prophet Style Image */
        #proof-image { width: 100%; max-height: 75%; object-fit: contain; box-shadow: 0 10px 30px rgba(0,0,0,0.8); margin-bottom: 25px; background: #fff; }

        #gallery-screen { display: none; justify-content: flex-start; padding-top: 40px; }
        #gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; overflow-y: auto; max-height: 65vh; margin-bottom: 20px; padding: 10px 5px; }
        .gallery-item { width: 100%; border: 3px solid var(--ink-black); border-radius: 2px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }

    </style>
</head>
<body>

<div id="profile-screen" class="modal-screen parchment-bg">
    <h1>MINISTRY OF MAGIC</h1>
    <h3>Department of Magical Law Enforcement</h3>
    <input type="text" id="agent-input" placeholder="E.G. FREYA OR ESME" autocomplete="off">
    <button id="login-btn" class="ministry-btn-large">BIND WAND</button>
</div>

<div id="briefing-screen" class="modal-screen parchment-bg">
    <div id="briefing-text"></div>
    <button id="accept-btn" class="ministry-btn-large" style="display:none;">BEGIN PATROL</button>
</div>

<div id="video-container">
    <div class="vignette"></div>
    <video id="camera" autoplay playsinline></video>
    <div id="overlay"></div>

    <!-- STANDARD SCANNER UI -->
    <div id="ui-layer">
        <div class="top-bar">
            <div class="leather-panel">
                <span id="agent-name-display">AUROR: ???</span>
                <span id="agent-rank-display">RANK: APPRENTICE<br>CAPTURES: 0</span>
            </div>
            <button id="gallery-btn" class="ministry-btn-small">THE AZKABAN LEDGER</button>
        </div>
        <div id="reticle">
            <div id="reticle-outer"></div>
            <div id="reticle-inner"></div>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center;">
            <div id="status-text" style="margin-bottom: 25px;">TRACE CHARM ACTIVE</div>
            <button id="scan-btn" class="cast-btn">CAST REVELIO</button>
        </div>
    </div>

    <!-- LIVE DUEL UI -->
    <div id="duel-layer">
        <div id="duel-title">DEFEND YOURSELF!</div>
        <div id="wizard-aura"></div>
        <div id="player-spell-blast"></div>

        <div style="width: 100%; text-align: center;">
            <p style="color: var(--parchment-light); font-size: 1.3rem; font-family: 'Cinzel Decorative', serif; text-shadow: 0 0 10px #000; margin-bottom: 15px;">MATCH THE AURA TO COUNTER-CURSE!</p>
            <div class="duel-controls">
                <div class="spell-btn btn-red" onclick="castCounterSpell('#ff3333')">🔥</div>
                <div class="spell-btn btn-green" onclick="castCounterSpell('#33ff33')">🌿</div>
                <div class="spell-btn btn-blue" onclick="castCounterSpell('#33ccff')">💧</div>
            </div>
        </div>
    </div>
</div>

<div id="duel-flash"></div>

<div id="proof-screen" class="modal-screen parchment-bg">
    <h2 style="color:var(--ministry-red); font-size: 2rem; margin-bottom:20px; border-bottom: 2px solid var(--ministry-gold); padding-bottom: 5px;">WIZARD APPREHENDED</h2>
    <img id="proof-image" src="" alt="Azkaban Mugshot">
    <button id="dismiss-btn" class="ministry-btn-large">DISPATCH TO AZKABAN</button>
</div>

<div id="gallery-screen" class="modal-screen parchment-bg">
    <h2 style="margin-top:0; color:var(--ministry-red); font-size: 2.2rem; margin-bottom: 15px;">AZKABAN HOLDING CELLS</h2>
    <div id="gallery-grid"></div>
    <div style="display: flex; gap: 10px;">
        <button id="close-gallery-btn" class="ministry-btn-large" style="font-size: 1.1rem; padding: 12px 20px;">RESUME PATROL</button>
        <button id="logout-btn" class="ministry-btn-small" style="background: var(--ink-black); color: var(--parchment-light);">RELINQUISH WAND</button>
    </div>
</div>

<!-- Hidden Canvas for Image Processing -->
<canvas id="canvas-processor" style="display:none;"></canvas>

<script>
    const video = document.getElementById('camera');
    const overlay = document.getElementById('overlay');
    const statusText = document.getElementById('status-text');
    const scanBtn = document.getElementById('scan-btn');
    
    const uiLayer = document.getElementById('ui-layer');
    const duelLayer = document.getElementById('duel-layer');
    const wizardAura = document.getElementById('wizard-aura');
    const playerBlast = document.getElementById('player-spell-blast');
    const duelFlash = document.getElementById('duel-flash');
    const duelTitle = document.getElementById('duel-title');

    const profileScreen = document.getElementById('profile-screen');
    const agentInput = document.getElementById('agent-input');
    const loginBtn = document.getElementById('login-btn');
    const briefingScreen = document.getElementById('briefing-screen');
    const briefingText = document.getElementById('briefing-text');
    const acceptBtn = document.getElementById('accept-btn');
    const videoContainer = document.getElementById('video-container');
    const proofScreen = document.getElementById('proof-screen');
    const proofImage = document.getElementById('proof-image');
    const dismissBtn = document.getElementById('dismiss-btn');
    const galleryScreen = document.getElementById('gallery-screen');
    const galleryBtn = document.getElementById('gallery-btn');
    const closeGalleryBtn = document.getElementById('close-gallery-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const galleryGrid = document.getElementById('gallery-grid');
    const agentNameDisplay = document.getElementById('agent-name-display');
    const agentRankDisplay = document.getElementById('agent-rank-display');
    
    const canvas = document.getElementById('canvas-processor');
    const ctx = canvas.getContext('2d');

    // --- MAGICAL REGISTRY DATA ---
    const data_names = ["Gloom Hilda", "Malus Darkweaver", "Vex Blackwood", "Morwenna Shadowcast", "Grimble the Foul", "Silas Nightshade", "Blighted Barnaby", "Hexen Hearthbane", "Seraphina Snake-Eye", "Corvus Spellbound", "Evelyn Ember", "Lucius Gloom", "Madame Maledict"];
    const data_crimes = ["Transfiguring Muggles", "Unregistered Potion Brewing", "Cursing the Wi-Fi", "Summoning Unforgivable Rains", "Theft of Time-Turners", "Jinxing the Ministry Lifts", "Enchanting Biting Brooms", "Forging Prophecies", "Smuggling Dragon Eggs"];
    const data_levels = ["Mischief Maker", "Apprentice Hexer", "Grand Sorcerer", "Master of Shadows", "Forbidden Caster", "Chaos Bringer", "Wand-Breaker"];

    let audioCtx;
    let forceWizard = false;
    let holdTimer;
    let currentAgent = "";
    let intelDatabase = [];
    
    // Duel Mechanics
    const spellColors = ['#ff3333', '#33ff33', '#33ccff'];
    let currentWizardColor = '';
    let successfulCounters = 0;
    const requiredCounters = 3;

    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        
        if (type === 'chime') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime); osc.frequency.setValueAtTime(1108.73, audioCtx.currentTime + 0.1); osc.frequency.setValueAtTime(1318.51, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
            osc.start(); osc.stop(audioCtx.currentTime + 0.8);
        } else if (type === 'whoosh') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(200, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.5); osc.frequency.linearRampToValueAtTime(200, audioCtx.currentTime + 1.0);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 1.0);
            osc.start(); osc.stop(audioCtx.currentTime + 1.0);
        } else if (type === 'dark_alert') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.0);
            osc.start(); osc.stop(audioCtx.currentTime + 1.0);
        } else if (type === 'zap') {
            osc.type = 'square'; osc.frequency.setValueAtTime(1200, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        } else if (type === 'clash') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.8, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'escape') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(200, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        } else if (type === 'capture') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(440, audioCtx.currentTime); osc.frequency.setValueAtTime(554, audioCtx.currentTime + 0.1); osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.2); osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.6, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            osc.start(); osc.stop(audioCtx.currentTime + 1.5);
        } else if (type === 'camera') {
            osc.type = 'noise'; gain.gain.setValueAtTime(1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }
    }

    function getRank(count) {
        if (count < 3) return "APPRENTICE AUROR";
        if (count < 8) return "JUNIOR AUROR";
        if (count < 15) return "SENIOR AUROR";
        return "MASTER DUELIST";
    }

    function updateAgentDisplay() {
        agentNameDisplay.innerText = `AUROR: ${currentAgent}`;
        agentRankDisplay.innerHTML = `RANK: ${getRank(intelDatabase.length)}<br>CAPTURES: ${intelDatabase.length}`;
    }

    loginBtn.addEventListener('click', () => {
        initAudio();
        const name = agentInput.value.trim().toUpperCase();
        if (name === "") return;
        currentAgent = name;
        const savedData = localStorage.getItem(`wizardIntel_${currentAgent}`);
        intelDatabase = savedData ? JSON.parse(savedData) : [];
        updateAgentDisplay();
        playSound('chime');
        profileScreen.style.display = 'none';
        briefingScreen.style.display = 'flex';
        typeWriter();
    });

    logoutBtn.addEventListener('click', () => {
        galleryScreen.style.display = 'none';
        videoContainer.style.display = 'none';
        agentInput.value = "";
        profileScreen.style.display = 'flex';
    });

    const missionText = "DEPARTMENT OF MAGICAL LAW ENFORCEMENT\n\nDirective 42: Dark Wizards are currently operating under Muggle guise in your vicinity.\n\nCast Revelio to expose their true nature. Should a duel initiate, observe their magical aura and cast the exact matching counter-curse before they Apparate away.\n\nThree successful strikes will bind them.\n\nConstant Vigilance.";
    let typeIndex = 0;
    
    function typeWriter() {
        if (typeIndex < missionText.length) {
            briefingText.innerHTML += missionText.charAt(typeIndex) === '\n' ? '<br>' : missionText.charAt(typeIndex);
            typeIndex++;
            if(typeIndex % 4 === 0) playSound('whoosh'); 
            setTimeout(typeWriter, 30);
        } else acceptBtn.style.display = 'block';
    }

    acceptBtn.addEventListener('click', () => {
        playSound('chime');
        briefingScreen.style.display = 'none';
        videoContainer.style.display = 'block';
        setupCamera();
    });

    async function setupCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
            video.srcObject = stream;
        } catch (err) {
            statusText.innerText = "MAGICAL INTERFERENCE DETECTED";
        }
    }

    // --- LIVE DUEL MECHANICS ---
    function startDuel() {
        uiLayer.style.display = 'none'; 
        duelLayer.style.display = 'flex'; 
        successfulCounters = 0;
        duelTitle.innerText = "DEFEND YOURSELF!";
        duelTitle.style.color = "#ff3333";
        playSound('dark_alert');
        setTimeout(wizardAttack, 1000); 
    }

    function wizardAttack() {
        currentWizardColor = spellColors[Math.floor(Math.random() * spellColors.length)];
        wizardAura.style.color = currentWizardColor;
        wizardAura.style.opacity = '1';
        playSound('whoosh');
    }

    window.castCounterSpell = function(playerColor) {
        if (wizardAura.style.opacity === '0') return; 
        
        playSound('zap');
        playerBlast.style.color = playerColor;
        playerBlast.style.opacity = '1';
        playerBlast.style.bottom = '40%'; 
        
        setTimeout(() => {
            playerBlast.style.opacity = '0';
            playerBlast.style.bottom = '180px'; 
            
            if (playerColor === currentWizardColor) {
                successfulCounters++;
                playSound('clash');
                
                duelFlash.style.background = "#fff";
                duelFlash.style.opacity = '0.8';
                setTimeout(() => duelFlash.style.opacity = '0', 100);
                
                wizardAura.style.opacity = '0'; 
                
                if (successfulCounters >= requiredCounters) {
                    winDuel();
                } else {
                    duelTitle.innerText = `BLOCKED! (${successfulCounters}/${requiredCounters})`;
                    duelTitle.style.color = "#33ff33";
                    setTimeout(wizardAttack, 800); 
                }
            } else {
                loseDuel();
            }
        }, 150); 
    };

    function winDuel() {
        playSound('camera');
        generateAzkabanMugshot(); // Instant Snap!
        
        playSound('capture');
        resetToScanner();
        proofScreen.style.display = 'flex';
    }

    function loseDuel() {
        playSound('escape');
        duelFlash.style.background = "#ff0000";
        duelFlash.style.opacity = '0.8';
        setTimeout(() => duelFlash.style.opacity = '0', 300);
        
        duelTitle.innerText = "APPARATED AWAY!";
        duelTitle.style.color = "#ff3333";
        wizardAura.style.opacity = '0';
        
        setTimeout(() => {
            resetToScanner();
            statusText.innerText = "TARGET LOST";
            setTimeout(() => { statusText.innerText = "TRACE CHARM ACTIVE"; scanBtn.disabled = false; }, 2000);
        }, 1500);
    }

    function resetToScanner() {
        duelLayer.style.display = 'none';
        uiLayer.style.display = 'flex';
        wizardAura.style.opacity = '0';
    }

    // --- AZKABAN MUGSHOT GENERATOR ---
    function wrapText(context, text, x, y, maxWidth, lineHeight) {
        const words = text.split(' '); let line = '';
        for(let n = 0; n < words.length; n++) {
            const testLine = line + words[n] + ' '; const metrics = context.measureText(testLine);
            if (metrics.width > maxWidth && n > 0) {
                context.strokeText(line, x, y); context.fillText(line, x, y);
                line = words[n] + ' '; y += lineHeight;
            } else line = testLine;
        }
        context.strokeText(line, x, y); context.fillText(line, x, y); return y + lineHeight; 
    }

    function generateAzkabanMugshot() {
        // Ensure fonts are applied by canvas
        ctx.font = "30px 'IM Fell English'"; 
        
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        const w = canvas.width; const h = canvas.height;
        
        // 1. Draw camera feed with heavy Sepia / High Contrast filter for "Daily Prophet" look
        ctx.filter = 'sepia(100%) contrast(140%) grayscale(20%) brightness(85%)';
        ctx.drawImage(video, 0, 0, w, h);
        ctx.filter = 'none'; 
        
        // 2. Draw Heavy Iron Prison Bars over the suspect
        const barWidth = Math.floor(w * 0.05);
        const gap = Math.floor(w / 5);
        for(let i = gap/2; i < w; i += gap) {
            let grd = ctx.createLinearGradient(i, 0, i+barWidth, 0);
            grd.addColorStop(0, "#111"); grd.addColorStop(0.5, "#4a4a4a"); grd.addColorStop(1, "#111");
            ctx.fillStyle = grd;
            ctx.fillRect(i, 0, barWidth, h);
        }
        
        // 3. Draw the Ministry Plaque at the bottom
        const margin = Math.floor(w * 0.06); 
        const plaqueY = h * 0.65;
        const plaqueHeight = h * 0.3;

        // Plaque Parchment Background
        ctx.fillStyle = "#e8dcc4"; 
        ctx.fillRect(margin, plaqueY, w - (margin * 2), plaqueHeight); 
        ctx.strokeStyle = "#5c0011"; ctx.lineWidth = 3;
        ctx.strokeRect(margin + 5, plaqueY + 5, w - (margin * 2) - 10, plaqueHeight - 10);
        
        ctx.fillStyle = "#1a1110"; ctx.strokeStyle = "#1a1110";
        ctx.lineWidth = 1; ctx.font = `bold ${Math.floor(h * 0.035)}px 'Cinzel Decorative', serif`; 
        ctx.textBaseline = "top";
        const maxTextWidth = w - (margin * 3);
        const lineHeight = Math.floor(h * 0.04); 
        let currentY = plaqueY + 20;

        const printLine = (label, value) => {
            ctx.font = `bold ${Math.floor(h * 0.03)}px 'Cinzel Decorative', serif`; 
            ctx.fillText(`${label}:`, margin + 20, currentY); 
            const labelWidth = ctx.measureText(`${label}: `).width;
            
            ctx.font = `${Math.floor(h * 0.035)}px 'IM Fell English', serif`; 
            currentY = wrapText(ctx, value, margin + 20 + labelWidth, currentY, maxTextWidth - labelWidth, lineHeight);
            currentY += (lineHeight * 0.2); 
        };

        // Red "HAVE YOU SEEN THIS WIZARD" Stamp
        ctx.save();
        ctx.translate(w/2, h * 0.15);
        ctx.rotate(-Math.PI / 12);
        ctx.fillStyle = "rgba(139, 0, 0, 0.85)"; ctx.font = `bold ${Math.floor(h * 0.08)}px 'Cinzel Decorative', serif`;
        ctx.textAlign = "center";
        ctx.fillText("HAVE YOU SEEN", 0, -40);
        ctx.fillText("THIS WIZARD?", 0, 40);
        ctx.restore();

        // Print details on plaque
        printLine("ALIAS", data_names[Math.floor(Math.random() * data_names.length)]);
        printLine("CRIME", data_crimes[Math.floor(Math.random() * data_crimes.length)]);
        printLine("RANK", data_levels[Math.floor(Math.random() * data_levels.length)]);

        proofImage.dataset.tempImageData = canvas.toDataURL('image/jpeg', 0.8);
        proofImage.src = proofImage.dataset.tempImageData;
    }

    // --- CHEAT CONTROLS (Hold 2 secs) ---
    function startHoldTimer() { holdTimer = setTimeout(() => { forceWizard = true; scanBtn.style.borderColor = "#fff"; setTimeout(() => { scanBtn.style.borderColor = "#cfa052"; }, 300); }, 2000); }
    function cancelHoldTimer() { clearTimeout(holdTimer); }

    scanBtn.addEventListener('mousedown', startHoldTimer); scanBtn.addEventListener('touchstart', startHoldTimer, {passive: true});
    scanBtn.addEventListener('mouseup', cancelHoldTimer); scanBtn.addEventListener('mouseleave', cancelHoldTimer); scanBtn.addEventListener('touchend', cancelHoldTimer);

    // --- SCAN LOGIC ---
    scanBtn.addEventListener('click', () => {
        initAudio(); scanBtn.disabled = true; statusText.innerText = "SEEKING DARK MAGIC..."; statusText.classList.remove('muggle-active');
        
        let pulseCount = 0;
        let scanInterval = setInterval(() => { playSound('whoosh'); pulseCount++; if(pulseCount >= 3) clearInterval(scanInterval); }, 500);

        overlay.style.backgroundColor = "rgba(92, 0, 17, 0.2)";

        setTimeout(() => {
            const isWizard = forceWizard || (Math.random() < 0.15); forceWizard = false; 

            if (isWizard) {
                overlay.style.backgroundColor = "rgba(0, 0, 0, 0)";
                startDuel(); 
            } else {
                statusText.innerText = "NO MAGICAL TRACE - STANDARD MUGGLE"; 
                statusText.classList.add('muggle-active');
                playSound('chime');
                setTimeout(() => { 
                    statusText.innerText = "TRACE CHARM ACTIVE"; 
                    statusText.classList.remove('muggle-active');
                    overlay.style.backgroundColor = "rgba(0, 0, 0, 0)"; scanBtn.disabled = false; 
                }, 2500);
            }
        }, 1500); 
    });

    dismissBtn.addEventListener('click', () => {
        intelDatabase.unshift(proofImage.dataset.tempImageData); 
        localStorage.setItem(`wizardIntel_${currentAgent}`, JSON.stringify(intelDatabase));
        updateAgentDisplay();
        
        proofScreen.style.display = 'none';
        scanBtn.disabled = false;
        statusText.innerText = "TRACE CHARM ACTIVE";
    });

    galleryBtn.addEventListener('click', () => {
        galleryGrid.innerHTML = ''; 
        if(intelDatabase.length === 0) {
            galleryGrid.innerHTML = '<p style="color:var(--ink-black); font-size:1.2rem; text-align:center; width:100%;">The cells are empty.</p>';
        } else {
            intelDatabase.forEach(imgSrc => {
                const img = document.createElement('img');
                img.src = imgSrc; img.className = 'gallery-item';
                galleryGrid.appendChild(img);
            });
        }
        galleryScreen.style.display = 'flex';
    });

    closeGalleryBtn.addEventListener('click', () => { galleryScreen.style.display = 'none'; });

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
    }
</script>
