<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auror Field Scanner</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1110">
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --ministry-red: #5c0011; --ministry-gold: #cfa052; 
            --parchment-light: #fdf5e6; --parchment-dark: #e8dcc4; 
            --ink-black: #1a1110;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; 
            background-color: var(--ink-black);
            font-family: 'IM Fell English', serif; 
            overflow: hidden; user-select: none; -webkit-user-select: none; 
            color: var(--ink-black);
        }

        h1, h2, h3 { font-family: 'Cinzel Decorative', serif; margin: 0; text-align: center; }

        .parchment-bg {
            background-color: var(--parchment-dark);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(139, 69, 19, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(139, 69, 19, 0.12) 0%, transparent 50%),
                linear-gradient(to right, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 20%, rgba(255,255,255,0) 80%, rgba(255,255,255,0.15) 100%);
            box-shadow: inset 0 0 80px rgba(43, 0, 0, 0.8);
        }

        /* --- CAMERA & MIST EFFECTS --- */
        #video-container { position: relative; width: 100vw; height: 100vh; display: none; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-shadow: inset 0 0 150px rgba(0, 0, 0, 0.95); pointer-events: none; z-index: 5; }

        /* The Revelio Swirl */
        #revelio-swirl {
            position: absolute; top: 50%; left: 50%; width: 250px; height: 250px;
            transform: translate(-50%, -50%); border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 0%, rgba(138,43,226,0.6) 20%, rgba(255,255,255,0.8) 50%, transparent 100%);
            animation: swirlFast 1.5s linear infinite; filter: blur(8px);
            opacity: 0; pointer-events: none; z-index: 8; transition: opacity 0.4s;
        }
        @keyframes swirlFast { 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        /* Dark Wizard Escape Mist */
        #escape-mist {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.95) 0%, rgba(26,17,16,1) 100%);
            opacity: 0; z-index: 18; pointer-events: none; transition: opacity 0.5s ease-out;
        }

        .shake { animation: cameraShake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes cameraShake { 10%, 90% { transform: translate3d(-5px, 0, 0); } 20%, 80% { transform: translate3d(5px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-15px, 0, 0); } 40%, 60% { transform: translate3d(15px, 0, 0); } }
        
        #cracked-glass {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 50 L10 10 M50 50 L90 20 M50 50 L30 90 M50 50 L80 80 M50 50 L15 60 M50 50 L70 10" stroke="white" stroke-width="0.5" opacity="0.8"/></svg>');
            background-size: cover; z-index: 17; display: none; pointer-events: none;
        }

        /* --- UI LAYER --- */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between; align-items: center;
            padding: 30px 15px; box-sizing: border-box; z-index: 10; pointer-events: none;
        }
        .top-bar { display: flex; justify-content: space-between; width: 100%; pointer-events: auto; }
        
        .leather-panel {
            background: rgba(26, 17, 16, 0.9); border: 2px solid var(--ministry-gold); padding: 10px 15px;
            border-radius: 6px; display: flex; flex-direction: column; color: var(--parchment-light); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.8); max-width: 50%;
        }
        #agent-name-display { font-family: 'Cinzel Decorative', serif; font-size: 1rem; text-shadow: 1px 1px 2px #000; }
        #agent-rank-display { font-size: 0.85rem; color: var(--ministry-gold); margin-top: 4px; font-style: italic; }
        
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        .ministry-btn-small {
            background: var(--ministry-red); border: 1px solid var(--ministry-gold); color: var(--parchment-light);
            padding: 10px 15px; border-radius: 4px; font-family: 'Cinzel Decorative', serif; font-size: 0.9rem;
            cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.6); transition: transform 0.1s; letter-spacing: 1px;
        }
        .ministry-btn-small:active { transform: scale(0.95); }

        #status-text {
            color: var(--parchment-light); font-size: 1.2rem; font-family: 'Cinzel Decorative', serif;
            background: rgba(26, 17, 16, 0.9); padding: 10px 25px; border-radius: 6px; border: 1px solid var(--ministry-gold); 
            box-shadow: 0 6px 12px rgba(0,0,0,0.8); transition: all 0.3s ease; letter-spacing: 1px; text-align: center; pointer-events: auto;
        }
        
        .cast-btn {
            pointer-events: auto; background: radial-gradient(circle, #7a0016, #4a000d);
            border: 2px solid var(--ministry-gold); color: var(--parchment-light); font-family: 'Cinzel Decorative', serif; 
            font-size: 1.3rem; padding: 15px 35px; border-radius: 40px; cursor: pointer; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,255,255,0.2);
            transition: transform 0.1s; margin-top: 15px; letter-spacing: 2px; text-transform: uppercase;
        }
        .cast-btn:active { transform: translateY(4px); box-shadow: 0 4px 8px rgba(0,0,0,0.8); }

        #map-icon {
            position: absolute; bottom: 120px; right: 20px; width: 50px; height: 50px; 
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%235c0011"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>') no-repeat center center;
            background-size: 30px 30px; background-color: #e8dcc4; border: 2px solid var(--ministry-red); 
            border-radius: 5px; pointer-events: auto; cursor: pointer; box-shadow: 0 4px 10px #000;
        }

        /* --- MODALS --- */
        .modal-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: 25px; box-sizing: border-box; text-align: center; }
        
        #profile-screen h1 { color: var(--ministry-red); font-size: 2.2rem; margin-bottom: 5px; text-shadow: 1px 1px 0px rgba(255,255,255,0.3); }
        #profile-screen h3 { font-size: 1.1rem; margin-bottom: 30px; border-bottom: 1px solid var(--ink-black); padding-bottom: 10px;}
        #agent-input { background: transparent; border: none; border-bottom: 2px dashed var(--ministry-red); color: var(--ink-black); font-family: 'Cinzel Decorative', serif; font-size: 1.5rem; padding: 10px; text-align: center; margin-bottom: 25px; outline: none; width: 85%; }

        #briefing-screen { padding-top: 6vh; padding-bottom: 6vh; }
        #briefing-text { font-size: 1.2rem; line-height: 1.6; flex-grow: 1; overflow-y: auto; text-align: left; margin-bottom: 20px; padding: 0 10px; }

        /* --- LIVE DUEL UI --- */
        #duel-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: space-between; align-items: center; padding: 40px 15px; box-sizing: border-box; z-index: 15; pointer-events: none; }
        #duel-title { font-family: 'Cinzel Decorative', serif; color: #ff3333; text-shadow: 0 0 10px #000; font-size: 1.8rem; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 8px; border: 1px solid #ff3333; margin-top: 20px;}
        
        #wizard-aura {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            width: 140px; height: 140px; border-radius: 50%; opacity: 0;
            box-shadow: 0 0 120px currentColor, inset 0 0 60px currentColor;
            background: radial-gradient(circle, currentColor 20%, transparent 70%);
            transition: opacity 0.3s, color 0.2s; pointer-events: none;
            animation: pulseAura 0.5s infinite alternate; filter: blur(8px);
        }
        @keyframes pulseAura { 0% { transform: translate(-50%, -50%) scale(1); } 100% { transform: translate(-50%, -50%) scale(1.2); } }
        
        .duel-controls { display: flex; justify-content: space-around; width: 100%; margin-bottom: 20px; pointer-events: auto;}
        
        .spell-btn {
            border: 2px solid var(--parchment-light); border-radius: 50%; width: 65px; height: 65px;
            font-size: 1.8rem; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.8), inset 0 0 10px rgba(255,255,255,0.3); 
            cursor: pointer; transition: transform 0.1s; color: #fff;
        }
        .spell-btn:active { transform: scale(0.9); }
        .btn-red { background: radial-gradient(circle, #ff3333, #8b0000); }
        .btn-green { background: radial-gradient(circle, #33ff33, #006400); transform: translateY(-20px); }
        .btn-blue { background: radial-gradient(circle, #33ccff, #00008b); }

        #particle-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; }
        #duel-flash { position: absolute; top:0; left:0; width:100%; height:100%; background: #fff; opacity: 0; pointer-events: none; transition: opacity 0.1s; z-index: 110;}

        /* --- MARAUDER'S MAP (Static Blueprint) --- */
        #map-screen { display: none; background: #d4c3a3; z-index: 120; padding: 0;}
        #map-blueprint {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
            background-image: 
                linear-gradient(rgba(92, 0, 17, 0.2) 2px, transparent 2px),
                linear-gradient(90deg, rgba(92, 0, 17, 0.2) 2px, transparent 2px),
                linear-gradient(rgba(92, 0, 17, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(92, 0, 17, 0.1) 1px, transparent 1px);
            background-size: 80px 80px, 80px 80px, 20px 20px, 20px 20px;
        }
        /* Drawn architectural walls */
        .map-wall { position: absolute; background: rgba(92, 0, 17, 0.7); box-shadow: 2px 2px 5px rgba(0,0,0,0.2);}
        .footprints { position: absolute; color: #5c0011; transition: all 2s ease-in-out; text-align: center; font-family: inherit; font-size: 0.9rem; font-weight: bold; text-shadow: 0 0 2px rgba(92,0,17,0.4); display: flex; flex-direction: column; align-items: center; justify-content: center;}

        /* --- AZKABAN PROOF --- */
        #proof-screen { display: none; }
        #proof-image { width: 100%; max-height: 60%; object-fit: contain; box-shadow: 0 10px 30px rgba(0,0,0,0.9); margin-bottom: 20px; background: #fff; border: 4px solid var(--ink-black); }
        #gallery-screen { display: none; justify-content: flex-start; padding-top: 30px; }
        #gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; overflow-y: auto; max-height: 65vh; margin-bottom: 15px; padding: 5px; }
        .gallery-item { width: 100%; border: 3px solid var(--ink-black); box-shadow: 0 4px 8px rgba(0,0,0,0.4); }

    </style>
</head>
<body>

<div id="profile-screen" class="modal-screen parchment-bg">
    <h1>Ministry Registry</h1>
    <h3>Department of Magical Law Enforcement</h3>
    <input type="text" id="agent-input" placeholder="Wand Bearer Name" autocomplete="off">
    <button id="login-btn" class="cast-btn">Bind Wand</button>
</div>

<div id="briefing-screen" class="modal-screen parchment-bg" style="display:none;">
    <h1 style="margin-bottom: 15px; font-size: 2rem; color: var(--ministry-red);">Ministry Directive</h1>
    <div id="briefing-text"></div>
    <button id="accept-btn" class="cast-btn" style="margin-top: auto;">Begin Patrol</button>
</div>

<!-- Marauder's Map Layer -->
<div id="map-screen" class="modal-screen parchment-bg">
    <div id="map-blueprint"></div>
    <h2 style="position:absolute; top:25px; color:var(--ministry-red); z-index:10; font-size: 2.2rem; text-shadow: 0 0 5px #fff; width: 100%; text-align: center; background: rgba(232, 220, 196, 0.8);">Marauder's Map</h2>
    <button id="close-map-btn" class="cast-btn" style="position:absolute; bottom:30px; font-size:1.2rem; padding:12px 25px; z-index:10;">Mischief Managed</button>
</div>

<div id="video-container">
    <div class="vignette"></div>
    <div id="revelio-swirl"></div>
    <div id="escape-mist"></div>
    <div id="cracked-glass"></div>
    <video id="camera" autoplay playsinline></video>
    
    <div id="ui-layer">
        <div class="top-bar">
            <div class="leather-panel">
                <span id="agent-name-display">AUROR: ???</span>
                <span id="agent-rank-display">Rank: Apprentice | Captures: 0</span>
            </div>
            <div class="btn-group">
                <button id="gallery-btn" class="ministry-btn-small">THE LEDGER</button>
            </div>
        </div>
        
        <div id="map-icon"></div>
        
        <div style="display: flex; flex-direction: column; align-items: center; pointer-events: auto; width: 100%;">
            <div id="status-text">Trace Charm Active</div>
            <button id="scan-btn" class="cast-btn">Cast Revelio</button>
        </div>
    </div>

    <div id="duel-layer">
        <div id="duel-title">Defend Yourself!</div>
        <div id="wizard-aura"></div>
        <div style="width: 100%; text-align: center; pointer-events:auto;">
            <p style="color: #fff; font-size: 1.1rem; text-shadow: 0 0 5px #000; margin-bottom: 10px;">Quickly Match the Aura!</p>
            <div class="duel-controls">
                <div class="spell-btn btn-red" onclick="castCounterSpell('#ff3333')">🔥</div>
                <div class="spell-btn btn-green" onclick="castCounterSpell('#33ff33')">🌿</div>
                <div class="spell-btn btn-blue" onclick="castCounterSpell('#33ccff')">💧</div>
            </div>
        </div>
    </div>
</div>

<canvas id="particle-canvas"></canvas>
<div id="duel-flash"></div>

<div id="proof-screen" class="modal-screen parchment-bg">
    <h1 style="color:var(--ministry-red); font-size: 2rem; margin-bottom:15px;">Wizard Apprehended</h1>
    <img id="proof-image" src="" alt="Azkaban Mugshot">
    <button id="dismiss-btn" class="cast-btn">Dispatch to Azkaban</button>
</div>

<div id="gallery-screen" class="modal-screen parchment-bg">
    <h1 style="color:var(--ministry-red); font-size: 2.2rem; margin-bottom: 15px;">Holding Cells</h1>
    <div id="gallery-grid"></div>
    <div style="display: flex; gap: 10px; margin-top: 15px;">
        <button id="close-gallery-btn" class="ministry-btn-small" style="padding: 12px 20px; font-size: 1.1rem;">Resume Patrol</button>
        <button id="logout-btn" class="ministry-btn-small" style="background: var(--ink-black); color: var(--parchment-light); padding: 12px 20px; font-size: 1.1rem;">Relinquish Wand</button>
    </div>
</div>

<canvas id="canvas-processor" style="display:none;"></canvas>

<script>
    // --- MAGICAL REGISTRY DATA ---
    const data_names = ["Gloom Hilda", "Malus Darkweaver", "Vex Blackwood", "Morwenna Shadowcast", "Grimble the Foul", "Silas Nightshade", "Blighted Barnaby", "Hexen Hearthbane", "Seraphina Snake-Eye", "Corvus Spellbound", "Evelyn Ember", "Lucius Gloom", "Madame Maledict", "Thaddeus Thorn", "Ignatius Vane", "Morgana Moth", "Barnabas the Barmy", "Cassandra Curse", "Draco Dread", "Elara Eclipse"];
    const data_crimes = ["Transfiguring Muggles", "Unregistered Potion Brewing", "Cursing the Wi-Fi", "Summoning Unforgivable Rains", "Theft of Time-Turners", "Jinxing the Ministry Lifts", "Enchanting Biting Brooms", "Forging Prophecies", "Smuggling Dragon Eggs", "Attempting to transfigure a miniature schnauzer", "Hexing a schnauzer's bark", "Stealing Fowzer's treats", "Bewitching teapot spouts", "Illegal levitation of livestock"];

    // --- STATE VARIABLES ---
    let audioCtx, currentAgent = "", intelDatabase = [], capturesCount = 0;
    let forceWizard = false;
    let successfulCounters = 0, requiredCounters = 3, currentWizardColor = '';
    const spellColors = ['#ff3333', '#33ff33', '#33ccff'];

    // DOM Elements
    const video = document.getElementById('camera'), statusText = document.getElementById('status-text');
    const scanBtn = document.getElementById('scan-btn'), duelLayer = document.getElementById('duel-layer'), wizardAura = document.getElementById('wizard-aura');
    const particleCanvas = document.getElementById('particle-canvas'), ctxParticles = particleCanvas.getContext('2d');
    const mapScreen = document.getElementById('map-screen'), mapBlueprint = document.getElementById('map-blueprint');
    const revelioSwirl = document.getElementById('revelio-swirl');
    
    // Canvas Sizing
    window.addEventListener('resize', () => { particleCanvas.width = window.innerWidth; particleCanvas.height = window.innerHeight; });
    particleCanvas.width = window.innerWidth; particleCanvas.height = window.innerHeight;

    // --- NEW ELEMENTAL AUDIO SYSTEM ---
    function playSound(type) {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'theme') {
                // Mystical Celesta Login
                osc.type = 'sine'; const now = audioCtx.currentTime;
                osc.frequency.setValueAtTime(659.25, now); osc.frequency.setValueAtTime(783.99, now + 0.4); osc.frequency.setValueAtTime(739.99, now + 0.8); osc.frequency.setValueAtTime(659.25, now + 1.2); 
                gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.4, now + 0.1); gain.gain.exponentialRampToValueAtTime(0.01, now + 2.0);
                osc.start(now); osc.stop(now + 2.0);
            }
            else if (type === 'revelio') {
                // Sweeping magical scan
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 1.5);
                gain.gain.setValueAtTime(0, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.7); gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
                osc.start(); osc.stop(audioCtx.currentTime + 1.5);
            }
            else if (type === 'spell_red') {
                // Fire (Low aggressive)
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.6, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            }
            else if (type === 'spell_blue') {
                // Water (Rapid bubble sweep)
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
            else if (type === 'spell_green') {
                // Nature (Sharp wind whip)
                osc.type = 'triangle'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
            else if (type === 'dark_alert') {
                osc.type = 'square'; osc.frequency.setValueAtTime(100, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(60, audioCtx.currentTime + 1.0);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
                osc.start(); osc.stop(audioCtx.currentTime + 1.5);
            }
            else if (type === 'clash') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.6, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
            else if (type === 'escape') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.8);
                gain.gain.setValueAtTime(0.8, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
                osc.start(); osc.stop(audioCtx.currentTime + 0.8);
            }
            else if (type === 'capture') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(440, audioCtx.currentTime); osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.2); osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
                osc.start(); osc.stop(audioCtx.currentTime + 1.5);
            }
        } catch(e) {}
    }

    // --- INITIALIZATION ---
    function getRank(count) {
        if (count < 3) return "Apprentice Auror";
        if (count < 8) return "Junior Auror";
        if (count < 15) return "Senior Auror";
        return "Master Duelist";
    }

    document.getElementById('login-btn').addEventListener('click', () => {
        playSound('theme');
        currentAgent = document.getElementById('agent-input').value.trim().toUpperCase() || "UNKNOWN";
        intelDatabase = JSON.parse(localStorage.getItem(`wizardIntel_${currentAgent}`)) || [];
        capturesCount = intelDatabase.length;
        
        document.getElementById('agent-name-display').innerText = `Auror: ${currentAgent}`;
        document.getElementById('agent-rank-display').innerText = `Rank: ${getRank(capturesCount)} | Captures: ${capturesCount}`;
        
        document.getElementById('profile-screen').style.display = 'none';
        document.getElementById('briefing-screen').style.display = 'flex';
        
        document.getElementById('briefing-text').innerHTML = "Dark Wizards are operating under Muggle guise in your vicinity.<br><br>Your orders:<br>Use <b>Revelio</b> to expose their true nature.<br><br>If a duel initiates, you have exactly <b>2 Seconds</b> to counter their curse! Match their aura color using the Spell Icons (🔥, 🌿, 💧).<br><br>Tap the Map Icon to track footprints.<br><br>Constant Vigilance.";
        document.getElementById('accept-btn').style.display = 'block';
    });

    document.getElementById('accept-btn').addEventListener('click', () => {
        navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}, audio: false})
            .then(s => { video.srcObject = s; })
            .catch(e => { statusText.innerText = "Magical Interference Detected"; });

        document.getElementById('briefing-screen').style.display = 'none';
        document.getElementById('video-container').style.display = 'block';
    });

    // --- MARAUDER's MAP LOGIC (Static Blueprint + Collision) ---
    function initMapLayout() {
        mapBlueprint.innerHTML = '';
        // Draw some thick blueprint walls
        const wallData = [
            {t: 20, l: 20, w: 60, h: 2}, {t: 20, l: 20, w: 2, h: 40}, 
            {t: 60, l: 20, w: 30, h: 2}, {t: 40, l: 80, w: 2, h: 40},
            {t: 80, l: 40, w: 40, h: 2}, {t: 20, l: 50, w: 2, h: 20}
        ];
        wallData.forEach(w => {
            let el = document.createElement('div');
            el.className = 'map-wall';
            el.style.top = w.t + 'vh'; el.style.left = w.l + 'vw';
            el.style.width = w.w + 'vw'; el.style.height = w.h + 'vh';
            mapBlueprint.appendChild(el);
        });
    }

    document.getElementById('map-icon').addEventListener('click', () => {
        // Prompt for Mic to check password
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRec) {
            statusText.innerText = "Listening for Passcode...";
            let rec = new SpeechRec();
            rec.onresult = (e) => {
                let txt = e.results[0][0].transcript.toLowerCase();
                statusText.innerText = "Trace Charm Active";
                if(txt.includes("swear") || txt.includes("no good")) { openMap(); } 
                else { alert("Mr. Moony presents his compliments and begs you to keep your abnormally large nose out of other people's business."); }
            };
            rec.onerror = () => { statusText.innerText = "Trace Charm Active"; fallbackMap(); };
            rec.start();
        } else {
            fallbackMap();
        }
    });

    function fallbackMap() {
        let pwd = prompt("Speak the password (or type it here):");
        if(pwd && (pwd.toLowerCase().includes("swear") || pwd.toLowerCase().includes("no good"))) openMap();
        else alert("Mr. Moony presents his compliments and begs you to keep your abnormally large nose out of other people's business.");
    }
    
    let mapInterval, mapPrints = [];
    function openMap() {
        document.getElementById('map-screen').style.display = 'flex';
        initMapLayout();
        mapPrints = [];
        
        let numPrints = 10;
        for(let i=0; i<numPrints; i++) {
            let p = document.createElement('div');
            p.className = 'footprints';
            p.innerHTML = `<span style="font-size:1.5rem;">👣</span><br>${data_names[Math.floor(Math.random()*data_names.length)]}`;
            
            let startX = Math.random() * 80 + 10;
            let startY = Math.random() * 80 + 10;
            p.style.transform = `translate(${startX}vw, ${startY}vh)`;
            
            p.dataset.x = startX; p.dataset.y = startY;
            mapBlueprint.appendChild(p);
            mapPrints.push({el: p, x: startX, y: startY});
        }
        
        // Move with collision avoidance
        mapInterval = setInterval(() => {
            mapPrints.forEach(p => {
                let nX = p.x + (Math.random()*8 - 4);
                let nY = p.y + (Math.random()*8 - 4);
                
                // Bounds
                nX = Math.max(5, Math.min(85, nX));
                nY = Math.max(5, Math.min(85, nY));

                // Name Collision Check
                let collision = false;
                for(let other of mapPrints) {
                    if (other !== p) {
                        let dist = Math.sqrt(Math.pow(other.x - nX, 2) + Math.pow(other.y - nY, 2));
                        if (dist < 12) { collision = true; break; } // Keep away from each other
                    }
                }
                
                if (!collision) {
                    p.x = nX; p.y = nY;
                    p.el.style.transform = `translate(${nX}vw, ${nY}vh)`;
                }
            });
        }, 2500);
    }
    document.getElementById('close-map-btn').addEventListener('click', () => { 
        document.getElementById('map-screen').style.display = 'none'; 
        clearInterval(mapInterval);
    });

    // --- LIVE DUEL MECHANICS ---
    let particlesList = [];
    function animateParticles() {
        ctxParticles.clearRect(0,0, particleCanvas.width, particleCanvas.height);
        for(let i=particlesList.length-1; i>=0; i--) {
            let p = particlesList[i];
            p.x += p.vx; p.y += p.vy; p.life -= 0.04;
            if(p.life <= 0) { particlesList.splice(i, 1); continue; }
            ctxParticles.globalAlpha = p.life; ctxParticles.fillStyle = p.color;
            ctxParticles.beginPath(); ctxParticles.arc(p.x, p.y, p.size, 0, Math.PI*2); ctxParticles.fill();
        }
        ctxParticles.globalAlpha = 1.0;
        requestAnimationFrame(animateParticles);
    }
    animateParticles();

    scanBtn.addEventListener('click', () => {
        scanBtn.disabled = true; statusText.innerText = "Casting Revelio..."; 
        statusText.classList.remove('muggle-active');
        
        // Aura Scan Swirl
        revelioSwirl.style.opacity = '1';
        playSound('revelio');

        setTimeout(() => {
            revelioSwirl.style.opacity = '0';
            const isWizard = forceWizard || (Math.random() < 0.25); forceWizard = false; 

            if (isWizard) {
                startDuel(); 
            } else {
                statusText.innerText = "No Trace - Standard Muggle"; 
                statusText.classList.add('muggle-active');
                setTimeout(() => { 
                    statusText.innerText = "Trace Charm Active"; 
                    statusText.classList.remove('muggle-active');
                    scanBtn.disabled = false; 
                }, 2000);
            }
        }, 1500); 
    });

    let duelTimer; 

    function startDuel() {
        document.getElementById('ui-layer').style.display = 'none'; 
        duelLayer.style.display = 'flex'; 
        successfulCounters = 0;
        
        requiredCounters = 3;
        document.getElementById('duel-title').innerText = "Defend Yourself!";
        document.getElementById('duel-title').style.color = "#ff3333";
        playSound('dark_alert');
        
        setTimeout(wizardAttack, 1000); 
    }

    function wizardAttack() {
        currentWizardColor = spellColors[Math.floor(Math.random() * spellColors.length)];
        wizardAura.style.color = currentWizardColor;
        wizardAura.style.opacity = '1';
        playSound('whoosh');
        
        // EXACTLY 2.0 SECOND JEOPARDY TIMER
        duelTimer = setTimeout(() => {
            loseDuel("TOO SLOW!");
        }, 2000);
    }

    window.castCounterSpell = function(playerColor) {
        if (wizardAura.style.opacity === '0') return; 
        
        clearTimeout(duelTimer); // Stop the 2 second timer
        
        // Elemental Sound Mapping
        if(playerColor === '#ff3333') playSound('spell_red');
        else if(playerColor === '#33ff33') playSound('spell_green');
        else playSound('spell_blue');
        
        for(let i=0; i<40; i++) {
            particlesList.push({
                x: window.innerWidth/2, y: window.innerHeight - 150,
                vx: (Math.random()-0.5)*15, vy: (Math.random()*-20)-5,
                life: 1.0, color: playerColor, size: Math.random()*6+3
            });
        }
        
        setTimeout(() => {
            if (playerColor === currentWizardColor) {
                successfulCounters++;
                wizardAura.style.opacity = '0'; 
                playSound('clash');
                
                document.getElementById('duel-flash').style.opacity = '0.8';
                setTimeout(() => document.getElementById('duel-flash').style.opacity = '0', 100);

                if (successfulCounters >= requiredCounters) {
                    winDuel();
                } else {
                    document.getElementById('duel-title').innerText = `Blocked! (${successfulCounters}/${requiredCounters})`;
                    document.getElementById('duel-title').style.color = "#4dff4d";
                    setTimeout(wizardAttack, 800); 
                }
            } else {
                loseDuel("WRONG SPELL!");
            }
        }, 200); 
    };

    function winDuel() {
        try { generateAzkabanMugshot(); } catch(e) { console.error("Camera fail"); } 
        playSound('capture');
        duelLayer.style.display = 'none';
        document.getElementById('ui-layer').style.display = 'flex';
        wizardAura.style.opacity = '0';
        document.getElementById('proof-screen').style.display = 'flex';
    }

    function loseDuel(reason) {
        playSound('escape');
        document.getElementById('video-container').classList.add('shake');
        document.getElementById('cracked-glass').style.display = 'block';
        document.getElementById('escape-mist').style.opacity = '1';
        
        document.getElementById('duel-title').innerText = reason + " ESCAPED!";
        wizardAura.style.opacity = '0';
        
        setTimeout(() => {
            document.getElementById('video-container').classList.remove('shake');
            document.getElementById('cracked-glass').style.display = 'none';
            document.getElementById('escape-mist').style.opacity = '0';
            
            duelLayer.style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            statusText.innerText = "Target Lost";
            
            setTimeout(() => { statusText.innerText = "Trace Charm Active"; scanBtn.disabled = false; }, 2000);
        }, 2000);
    }

    // --- AZKABAN MUGSHOT GENERATOR (Robust Fix) ---
    function wrapText(context, text, x, y, maxWidth, lineHeight) {
        const words = text.split(' '); let line = '';
        for(let n = 0; n < words.length; n++) {
            const testLine = line + words[n] + ' '; const metrics = context.measureText(testLine);
            if (metrics.width > maxWidth && n > 0) {
                context.strokeText(line, x, y); context.fillText(line, x, y);
                line = words[n] + ' '; y += lineHeight;
            } else line = testLine;
        }
        context.strokeText(line, x, y); context.fillText(line, x, y); return y + lineHeight; 
    }

    function generateAzkabanMugshot() {
        const c = document.getElementById('canvas-processor');
        const imgEl = document.getElementById('proof-image');
        
        // Ensure explicit dimensions
        c.width = video.videoWidth || 640; 
        c.height = video.videoHeight || 480;
        const w = c.width, h = c.height;
        
        try {
            ctx.filter = 'sepia(100%) contrast(140%) grayscale(20%) brightness(85%)';
            if(video.videoWidth > 0) ctx.drawImage(video, 0, 0, w, h);
            else { ctx.fillStyle="#443322"; ctx.fillRect(0,0,w,h); } 
            ctx.filter = 'none'; 
        } catch(e) {
            ctx.fillStyle="#443322"; ctx.fillRect(0,0,w,h);
        }
        
        // Iron Bars
        const gap = Math.floor(w / 5);
        for(let i = gap/2; i < w; i += gap) {
            ctx.fillStyle = "#111"; ctx.fillRect(i, 0, Math.floor(w*0.05), h);
        }
        
        // Info Plaque
        const margin = Math.floor(w * 0.06); 
        ctx.fillStyle = "#e8dcc4"; ctx.fillRect(margin, h*0.65, w-(margin*2), h*0.3); 
        ctx.strokeStyle = "#5c0011"; ctx.lineWidth = 3; ctx.strokeRect(margin+5, h*0.65+5, w-(margin*2)-10, h*0.3-10);
        
        ctx.fillStyle = "#1a1110"; ctx.textBaseline = "top";
        const maxTextWidth = w - (margin * 3);
        const lineHeight = Math.floor(h * 0.04); 
        let currentY = h*0.65 + 20;

        const printLine = (label, value) => {
            ctx.font = `bold ${Math.floor(h*0.03)}px serif`; 
            ctx.fillText(`${label}:`, margin + 20, currentY); 
            const labelWidth = ctx.measureText(`${label}: `).width;
            ctx.font = `${Math.floor(h*0.035)}px serif`; 
            currentY = wrapText(ctx, value, margin + 20 + labelWidth, currentY, maxTextWidth - labelWidth, lineHeight);
            currentY += (lineHeight * 0.2); 
        };

        let targetName = data_names[Math.floor(Math.random() * data_names.length)];
        printLine("Alias", targetName);
        printLine("Crime", data_crimes[Math.floor(Math.random() * data_crimes.length)]);

        try {
            const dataUrl = c.toDataURL('image/jpeg', 0.8);
            imgEl.dataset.tempImageData = dataUrl;
            imgEl.src = dataUrl;
        } catch(e) {
            console.log("Canvas Export Error", e);
        }
    }

    // Modal Triggers
    document.getElementById('dismiss-btn').addEventListener('click', () => {
        let imgData = document.getElementById('proof-image').dataset.tempImageData;
        if(imgData) {
            intelDatabase.unshift(imgData); 
            localStorage.setItem(`wizardIntel_${currentAgent}`, JSON.stringify(intelDatabase));
            capturesCount = intelDatabase.length;
            document.getElementById('agent-rank-display').innerText = `Rank: ${getRank(capturesCount)}`;
        }
        document.getElementById('proof-screen').style.display = 'none';
        scanBtn.disabled = false; statusText.innerText = "Trace Charm Active";
    });

    document.getElementById('gallery-btn').addEventListener('click', () => {
        const grid = document.getElementById('gallery-grid'); grid.innerHTML = '';
        if(intelDatabase.length === 0) {
            grid.innerHTML = '<p style="color:var(--ink-black); font-size:1.4rem; text-align:center; width:100%;">The cells are empty.</p>';
        } else {
            intelDatabase.forEach(imgSrc => {
                const img = document.createElement('img'); img.src = imgSrc; img.className = 'gallery-item';
                grid.appendChild(img);
            });
        }
        document.getElementById('gallery-screen').style.display = 'flex';
    });
    document.getElementById('close-gallery-btn').addEventListener('click', () => document.getElementById('gallery-screen').style.display = 'none');
    
    // Secret Menu Trigger
    let menuTaps = 0;
    statusText.addEventListener('click', () => {
        menuTaps++;
        if (menuTaps >= 5) {
            menuTaps = 0;
            let pwd = prompt("Enter Minister Password:");
            if (pwd && pwd.toLowerCase() === "alohomora") {
                forceWizard = true;
                alert("Mischief Managed. Next scan guaranteed Dark Wizard.");
            }
        }
    });
