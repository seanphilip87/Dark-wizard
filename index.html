<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auror Field Scanner: Elite Edition</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1110">
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --ministry-red: #5c0011; 
            --ministry-gold: #cfa052; 
            --parchment-light: #fdf5e6; 
            --parchment-dark: #e8dcc4; 
            --ink-black: #1a1110; 
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background-color: var(--ink-black); 
            font-family: 'IM Fell English', serif; 
            overflow: hidden; user-select: none; -webkit-user-select: none; 
            color: var(--ink-black); 
        }

        h1, h2, h3 { font-family: 'Cinzel Decorative', serif; margin: 0; text-align: center; }

        /* Authentic Parchment Texture */
        .parchment-bg {
            background-color: var(--parchment-dark);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(139, 69, 19, 0.08) 0%, transparent 40%), 
                radial-gradient(circle at 80% 70%, rgba(139, 69, 19, 0.12) 0%, transparent 50%),
                linear-gradient(to right, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 20%, rgba(255,255,255,0) 80%, rgba(255,255,255,0.2) 100%);
            box-shadow: inset 0 0 80px rgba(43, 0, 0, 0.8);
        }

        /* --- CAMERA & ATMOSPHERE --- */
        #video-container { position: relative; width: 100vw; height: 100vh; display: none; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-shadow: inset 0 0 150px rgba(0, 0, 0, 0.95); pointer-events: none; z-index: 5; }

        /* Ambient Room Mist */
        #ambient-mist {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(200,200,255,0.08) 0%, transparent 50%);
            animation: driftMist 25s infinite alternate ease-in-out;
            pointer-events: none; z-index: 6; filter: blur(15px); transition: background 0.5s ease;
        }
        @keyframes driftMist { 0% { transform: translate(0, 0) rotate(0deg); } 100% { transform: translate(10%, 10%) rotate(5deg); } }

        /* Revelio Lifting Mist Animation */
        #revelio-mist {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.6) 0%, rgba(0,0,0,0.8) 100%);
            opacity: 0; pointer-events: none; z-index: 12; filter: blur(10px);
            transition: opacity 1.5s ease-out, transform 1.5s ease-out;
            transform: scale(1);
        }
        .mist-active { opacity: 1 !important; transform: scale(1.2) !important; }

        /* Screen Shake for missed spells */
        .shake { animation: cameraShake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes cameraShake { 10%, 90% { transform: translate3d(-5px, 0, 0); } 20%, 80% { transform: translate3d(5px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-10px, 0, 0); } 40%, 60% { transform: translate3d(10px, 0, 0); } }

        /* --- UI LAYER --- */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between; align-items: center;
            padding: 40px 15px; box-sizing: border-box; z-index: 10; pointer-events: none;
        }
        .top-bar { display: flex; justify-content: space-between; width: 100%; pointer-events: auto; }
        
        .leather-panel {
            background: rgba(26, 17, 16, 0.9); border: 2px solid var(--ministry-gold); padding: 12px 15px;
            border-radius: 4px; display: flex; flex-direction: column; color: var(--parchment-light); 
            box-shadow: 0 6px 12px rgba(0,0,0,0.8);
        }
        #agent-name-display { font-family: 'Cinzel Decorative', serif; font-size: 1.1rem; text-shadow: 1px 1px 2px #000; }
        #agent-rank-display { font-size: 0.9rem; color: var(--ministry-gold); margin-top: 4px; font-style: italic; }
        
        .btn-group { display: flex; flex-direction: column; gap: 8px; }
        .ministry-btn-small {
            background: var(--ministry-red); border: 1px solid var(--ministry-gold); color: var(--parchment-light);
            padding: 10px 15px; border-radius: 4px; font-family: 'Cinzel Decorative', serif; font-size: 0.9rem;
            cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.6); transition: background 0.2s;
        }
        .ministry-btn-small:active { background: #3a000a; }
        .btn-wanted { background: var(--ink-black); border-color: #ff3333; color: #ff3333; }

        #status-text {
            color: var(--parchment-light); font-size: 1.4rem; font-family: 'Cinzel Decorative', serif;
            background: rgba(26, 17, 16, 0.9); padding: 12px 30px; border-radius: 4px; border: 1px solid var(--ministry-gold); 
            box-shadow: 0 6px 12px rgba(0,0,0,0.8); transition: all 0.3s ease; letter-spacing: 1px;
        }

        .cast-btn {
            pointer-events: auto; background: radial-gradient(circle, #7a0016, #4a000d);
            border: 2px solid var(--ministry-gold); color: var(--parchment-light); font-family: 'Cinzel Decorative', serif; 
            font-size: 1.6rem; padding: 18px 45px; border-radius: 50px; cursor: pointer; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,255,255,0.2);
            transition: transform 0.1s; margin-top: 20px; letter-spacing: 2px;
        }
        .cast-btn:active { transform: translateY(4px); box-shadow: 0 4px 8px rgba(0,0,0,0.8); }

        /* --- MODALS --- */
        .modal-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: 25px; box-sizing: border-box; text-align: center; }
        
        #profile-screen h1 { color: var(--ministry-red); font-size: 2.8rem; margin-bottom: 5px; text-shadow: 1px 1px 0px rgba(255,255,255,0.3); line-height: 1.1;}
        #profile-screen h3 { font-size: 1.3rem; margin-bottom: 40px; border-bottom: 1px solid var(--ink-black); padding-bottom: 10px;}
        #agent-input {
            background: transparent; border: none; border-bottom: 2px dashed var(--ministry-red); color: var(--ink-black);
            font-family: 'Cinzel Decorative', serif; font-size: 1.6rem; padding: 10px; text-align: center;
            margin-bottom: 30px; outline: none; width: 85%;
        }
        #agent-input::placeholder { color: rgba(26, 17, 16, 0.4); }
        select { font-family: 'IM Fell English', serif; font-size: 1.2rem; background: transparent; border: 1px solid var(--ink-black); padding: 5px; margin-bottom: 40px; color: var(--ink-black); }

        #briefing-screen { display: none; padding-top: 10vh; }
        #briefing-text { font-size: 1.5rem; line-height: 1.6; flex-grow: 1; overflow-y: auto; text-align: left; margin-bottom: 30px; color: var(--ink-black); text-shadow: 0 0 2px rgba(255,255,255,0.5);}

        /* Most Wanted Board */
        #wanted-screen { display: none; }
        .wanted-poster {
            background: #fff; padding: 30px 20px; border: 1px solid #ccc; box-shadow: 4px 4px 15px rgba(0,0,0,0.5);
            transform: rotate(-2deg); margin-bottom: 40px; width: 85%;
        }
        .wanted-poster h2 { font-size: 1.8rem; color: #000; margin-bottom: 5px; font-family: 'IM Fell English', serif; }
        .wanted-poster h1 { font-size: 2.8rem; color: var(--ministry-red); margin: 15px 0; border-top: 3px double #000; border-bottom: 3px double #000; padding: 10px 0;}

        /* --- LIVE DUEL UI --- */
        #duel-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: space-between; align-items: center; padding: 50px 10px; box-sizing: border-box; z-index: 15; }
        #duel-title { color: #ff3333; text-shadow: 0 0 15px #000; font-size: 2.2rem; background: rgba(0,0,0,0.7); padding: 10px 25px; border-radius: 8px; border: 2px solid #ff3333; text-align: center; }
        
        #wizard-aura {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            width: 130px; height: 130px; border-radius: 50%; opacity: 0;
            box-shadow: 0 0 120px currentColor, inset 0 0 60px currentColor;
            background: radial-gradient(circle, currentColor 20%, transparent 70%);
            transition: opacity 0.3s, color 0.2s; pointer-events: none;
            animation: pulseAura 0.5s infinite alternate; filter: blur(8px);
        }
        @keyframes pulseAura { 0% { transform: translate(-50%, -50%) scale(1); } 100% { transform: translate(-50%, -50%) scale(1.3); } }
        
        .duel-controls { display: flex; justify-content: space-around; width: 100%; margin-bottom: 30px; pointer-events: auto;}
        .spell-btn {
            border: 3px solid #fff; border-radius: 50%; width: 80px; height: 80px; font-size: 2.5rem; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.8), inset 0 0 15px rgba(255,255,255,0.5); cursor: pointer; transition: transform 0.1s;
        }
        .spell-btn:active { transform: scale(0.9) translateY(4px); }
        .btn-red { background: radial-gradient(circle, #ff3333, #8b0000); }
        .btn-green { background: radial-gradient(circle, #33ff33, #006400); transform: translateY(-25px); }
        .btn-blue { background: radial-gradient(circle, #33ccff, #00008b); }

        #particle-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; }
        #duel-flash { position: absolute; top:0; left:0; width:100%; height:100%; background: #fff; opacity: 0; pointer-events: none; transition: opacity 0.1s; z-index: 110;}

        /* --- MARAUDER'S MAP --- */
        #map-screen { display: none; background: #d4c3a3; overflow: hidden; z-index: 120; }
        /* Subtle ink grid/texture to ensure it never looks "blank" */
        #map-texture { position: absolute; top:0; left:0; width:100%; height:100%; background-image: radial-gradient(rgba(92, 0, 17, 0.1) 2px, transparent 2px); background-size: 30px 30px; pointer-events: none;}
        #map-content { position: absolute; top: 50%; left: 50%; width: 200vw; height: 200vh; transform-origin: center center; transition: transform 0.1s linear; display: flex; justify-content: center; align-items: center; }
        .footprints { position: absolute; color: #5c0011; opacity: 0.8; transition: all 1.5s ease-in-out; text-align: center; font-family: 'IM Fell English', serif; font-size: 1.2rem; text-shadow: 0 0 2px rgba(92,0,17,0.3);}

        /* --- AZKABAN PROOF --- */
        #proof-screen { display: none; }
        #proof-image { width: 100%; max-height: 65%; object-fit: contain; box-shadow: 0 10px 30px rgba(0,0,0,0.9); margin-bottom: 25px; background: #fff; border: 2px solid var(--ink-black); }

        #gallery-screen { display: none; justify-content: flex-start; padding-top: 30px; }
        #gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; overflow-y: auto; max-height: 65vh; margin-bottom: 20px; padding: 5px; }
        .gallery-item { width: 100%; border: 3px solid var(--ink-black); box-shadow: 0 4px 8px rgba(0,0,0,0.4); }

    </style>
</head>
<body>

<div id="profile-screen" class="modal-screen parchment-bg">
    <h1>Ministry Registry</h1>
    <h3>Department of Magical Law Enforcement</h3>
    <input type="text" id="agent-input" placeholder="Wand Bearer Name" autocomplete="off">
    <h3 style="margin-bottom: 10px; border:none;">Select Wand Core:</h3>
    <select id="wand-core">
        <option value="dragon">Dragon Heartstring (Powerful Blasts)</option>
        <option value="phoenix">Phoenix Feather (Second Chance in Duel)</option>
        <option value="unicorn">Unicorn Hair (Enhanced Map Tracking)</option>
    </select>
    <button id="login-btn" class="cast-btn">Bind Wand</button>
</div>

<div id="briefing-screen" class="modal-screen parchment-bg">
    <div id="briefing-text"></div>
    <button id="accept-btn" class="cast-btn" style="display:none;">Begin Patrol</button>
</div>

<div id="wanted-screen" class="modal-screen parchment-bg">
    <div class="wanted-poster">
        <h2>HAVE YOU SEEN</h2>
        <h1 id="wanted-name">UNKNOWN</h1>
        <h2>APPROACH WITH CAUTION</h2>
    </div>
    <button id="close-wanted-btn" class="cast-btn">Return to Patrol</button>
</div>

<!-- Marauder's Map Layer -->
<div id="map-screen" class="modal-screen parchment-bg">
    <div id="map-texture"></div>
    <h2 style="position:absolute; top:30px; color:var(--ministry-red); z-index:10; font-size: 2.5rem; text-shadow: 0 0 5px #fff;">Marauder's Map</h2>
    <div id="map-content"></div>
    <button id="close-map-btn" class="ministry-btn-small" style="position:absolute; bottom:40px; font-size:1.4rem; padding:15px 30px;">Mischief Managed</button>
</div>

<div id="video-container">
    <div class="vignette"></div>
    <div id="ambient-mist"></div>
    <div id="revelio-mist"></div>
    <div id="cracked-glass"></div>
    <video id="camera" autoplay playsinline></video>
    
    <div id="ui-layer">
        <div class="top-bar">
            <div class="leather-panel">
                <span id="agent-name-display">AUROR: ???</span>
                <span id="agent-rank-display">Rank: Apprentice | Core: ???</span>
            </div>
            <div class="btn-group">
                <button id="wanted-btn" class="ministry-btn-small btn-wanted">MOST WANTED</button>
                <button id="gallery-btn" class="ministry-btn-small">THE LEDGER</button>
            </div>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; pointer-events: auto;">
            <div id="status-text">Trace Charm Active</div>
            <button id="scan-btn" class="cast-btn">Cast Revelio</button>
        </div>
    </div>

    <div id="duel-layer">
        <div id="duel-title">Defend Yourself!</div>
        <div id="wizard-aura"></div>
        <div style="width: 100%; text-align: center; pointer-events:auto;">
            <p style="color: var(--parchment-light); font-size: 1.3rem; text-shadow: 0 0 8px #000; margin-bottom: 15px; font-family:'Cinzel Decorative', serif;">Match the Aura to Counter-Curse!</p>
            <div class="duel-controls">
                <div class="spell-btn btn-red" onclick="castCounterSpell('#ff3333')"></div>
                <div class="spell-btn btn-green" onclick="castCounterSpell('#33ff33')"></div>
                <div class="spell-btn btn-blue" onclick="castCounterSpell('#33ccff')"></div>
            </div>
        </div>
    </div>
</div>

<canvas id="particle-canvas"></canvas>
<div id="duel-flash"></div>

<div id="proof-screen" class="modal-screen parchment-bg">
    <h1 style="color:var(--ministry-red); font-size: 2.2rem; margin-bottom:15px;">Wizard Apprehended</h1>
    <img id="proof-image" src="" alt="Azkaban Mugshot">
    <button id="dismiss-btn" class="cast-btn">Dispatch to Azkaban</button>
</div>

<div id="gallery-screen" class="modal-screen parchment-bg">
    <h1 style="color:var(--ministry-red); font-size: 2.5rem; margin-bottom: 15px;">Holding Cells</h1>
    <div id="gallery-grid"></div>
    <div style="display: flex; gap: 10px; margin-top: 10px;">
        <button id="close-gallery-btn" class="ministry-btn-small" style="padding: 15px 25px; font-size: 1.2rem;">Resume Patrol</button>
        <button id="logout-btn" class="ministry-btn-small" style="background: var(--ink-black); color: var(--parchment-light);">Relinquish Wand</button>
    </div>
</div>

<canvas id="canvas-processor" style="display:none;"></canvas>

<script>
    // --- MASSIVE MAGICAL REGISTRY DATA ---
    const data_names = [
        "Gloom Hilda", "Malus Darkweaver", "Vex Blackwood", "Morwenna Shadowcast", "Grimble the Foul", 
        "Silas Nightshade", "Blighted Barnaby", "Hexen Hearthbane", "Seraphina Snake-Eye", "Corvus Spellbound", 
        "Evelyn Ember", "Lucius Gloom", "Madame Maledict", "Thaddeus Thorn", "Ignatius Vane", 
        "Morgana Moth", "Barnabas the Barmy", "Cassandra Curse", "Draco Dread", "Elara Eclipse", 
        "Fenrir Frost", "Gideon Grim", "Hecate Hex", "Igor Ironwand", "Jinxed Jasper"
    ];
    const data_crimes = [
        "Transfiguring Muggles", "Unregistered Potion Brewing", "Cursing the Wi-Fi", 
        "Summoning Unforgivable Rains", "Theft of Time-Turners", "Jinxing the Ministry Lifts", 
        "Enchanting Biting Brooms", "Forging Prophecies", "Smuggling Dragon Eggs", 
        "Talking to Portrait Frames", "Attempting to transfigure a miniature schnauzer",
        "Hexing a schnauzer's bark", "Stealing Fowzer's treats", "Bewitching teapot spouts",
        "Illegal levitation of livestock", "Confounding local postmen", "Brewing Felix Felicis without permit",
        "Smuggling Peruvian Instant Darkness Powder", "Releasing Pixies in a public library"
    ];
    const data_levels = [
        "Mischief Maker", "Apprentice Hexer", "Grand Sorcerer", "Master of Shadows", 
        "Forbidden Caster", "Chaos Bringer", "Wand-Breaker", "Arch-Mage of Azkaban",
        "Dark Arts Novice", "Spell Weaver", "Curse Breaker", "Rogue Alchemist"
    ];

    // --- STATE VARIABLES ---
    let audioCtx, currentAgent = "", wandCore = "", intelDatabase = [], capturesCount = 0;
    let forceWizard = false, parentTarget = "", isBoss = false, secondChanceUsed = false, lumosActive = false;
    let successfulCounters = 0, requiredCounters = 3, currentWizardColor = '';
    const spellColors = ['#ff3333', '#33ff33', '#33ccff'];

    // DOM Elements
    const video = document.getElementById('camera'), statusText = document.getElementById('status-text');
    const scanBtn = document.getElementById('scan-btn'), duelLayer = document.getElementById('duel-layer'), wizardAura = document.getElementById('wizard-aura');
    const particleCanvas = document.getElementById('particle-canvas'), ctxParticles = particleCanvas.getContext('2d');
    const mapScreen = document.getElementById('map-screen'), mapContent = document.getElementById('map-content');
    const ambientMist = document.getElementById('ambient-mist'), revelioMist = document.getElementById('revelio-mist');
    
    // Resize Canvas
    window.addEventListener('resize', () => { particleCanvas.width = window.innerWidth; particleCanvas.height = window.innerHeight; });
    particleCanvas.width = window.innerWidth; particleCanvas.height = window.innerHeight;

    // --- AUDIO SYSTEM ---
    function playSound(type) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'zap') { osc.type = 'square'; osc.frequency.setValueAtTime(1200, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.15); gain.gain.setValueAtTime(0.4, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15); osc.start(); osc.stop(audioCtx.currentTime + 0.15); }
        else if (type === 'whoosh') { osc.type = 'sine'; osc.frequency.setValueAtTime(200, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.5); osc.frequency.linearRampToValueAtTime(200, audioCtx.currentTime + 1.0); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 1.0); osc.start(); osc.stop(audioCtx.currentTime + 1.0); }
        else if (type === 'dark_alert') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.5); gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.0); osc.start(); osc.stop(audioCtx.currentTime + 1.0); }
        else if (type === 'clash') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3); gain.gain.setValueAtTime(0.8, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3); osc.start(); osc.stop(audioCtx.currentTime + 0.3); }
        else if (type === 'escape') { osc.type = 'triangle'; osc.frequency.setValueAtTime(200, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.6); gain.gain.setValueAtTime(1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6); osc.start(); osc.stop(audioCtx.currentTime + 0.6); }
        else if (type === 'capture') { osc.type = 'triangle'; osc.frequency.setValueAtTime(440, audioCtx.currentTime); osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.2); osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.4); gain.gain.setValueAtTime(0.6, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5); osc.start(); osc.stop(audioCtx.currentTime + 1.5); }
    }

    // --- SPEECH RECOGNITION (Voice Lumos, Map, & Spells) ---
    let recognition;
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRec();
        recognition.continuous = true;
        recognition.interimResults = false;
        recognition.onresult = (event) => {
            const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
            console.log("Heard: " + transcript);
            
            // LUMOS / NOX
            if (transcript.includes("lumos")) toggleLumos(true);
            if (transcript.includes("nox")) toggleLumos(false);

            // MAP
            if (transcript.includes("solemnly swear") || transcript.includes("up to no good")) openMap();
            
            // DUEL SPELLS
            if (duelLayer.style.display === 'flex') {
                if (transcript.includes("expelliarmus") || transcript.includes("red")) castCounterSpell('#ff3333');
                else if (transcript.includes("stupefy") || transcript.includes("blue")) castCounterSpell('#33ccff');
                else if (transcript.includes("impedimenta") || transcript.includes("green")) castCounterSpell('#33ff33');
            }
        };
        recognition.onend = () => { if(document.getElementById('video-container').style.display === 'block') recognition.start(); }; 
    }

    // --- LUMOS LOGIC ---
    async function toggleLumos(turnOn) {
        lumosActive = turnOn;
        try {
            const track = video.srcObject.getVideoTracks()[0];
            await track.applyConstraints({ advanced: [{ torch: lumosActive }] });
        } catch (e) {
            // CSS Fallback
            ambientMist.style.background = lumosActive 
                ? 'radial-gradient(circle at 50% 50%, rgba(255,255,255,0.6) 0%, transparent 80%)' 
                : 'radial-gradient(circle at 50% 50%, rgba(200,200,255,0.08) 0%, transparent 50%)';
        }
        statusText.innerText = lumosActive ? "Lumos Maxima" : "Trace Charm Active";
    }

    // --- GYROSCOPE (Map Rotation) ---
    function requestOrientation() {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(r => { if (r === 'granted') startGyro(); }).catch(console.error);
        } else startGyro();
    }
    
    function startGyro() {
        window.addEventListener('deviceorientation', (e) => {
            if (mapScreen.style.display === 'flex') {
                if (e.webkitCompassHeading) mapContent.style.transform = `rotate(${-e.webkitCompassHeading}deg)`;
                else if (e.alpha) mapContent.style.transform = `rotate(${e.alpha}deg)`;
            }
        });
    }

    // --- GESTURE CONTROLS (Duel Fallback) ---
    let touchStartX = 0, touchStartY = 0;
    duelLayer.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; touchStartY = e.changedTouches[0].screenY; }, {passive:true});
    duelLayer.addEventListener('touchend', e => {
        let dX = e.changedTouches[0].screenX - touchStartX, dY = e.changedTouches[0].screenY - touchStartY;
        if (Math.abs(dX) > 50 || Math.abs(dY) > 50) {
            if (Math.abs(dY) > Math.abs(dX) && dY < 0) castCounterSpell('#ff3333'); // Swipe UP = Red
            else if (Math.abs(dX) > Math.abs(dY) && dX > 0) castCounterSpell('#33ccff'); // Swipe RIGHT = Blue
            else if (Math.abs(dY) > Math.abs(dX) && dY > 0) castCounterSpell('#33ff33'); // Swipe DOWN = Green
        }
    });

    // --- INITIALIZATION ---
    function getRank(count) {
        if (count < 3) return "Apprentice Auror";
        if (count < 8) return "Junior Auror";
        if (count < 15) return "Senior Auror";
        if (count < 25) return "Master Duelist";
        return "Head of the Auror Office";
    }

    function setWantedTarget() {
        let target = data_names[Math.floor(Math.random() * data_names.length)];
        localStorage.setItem(`wantedTarget_${currentAgent}`, target);
        document.getElementById('wanted-name').innerText = target;
    }

    document.getElementById('login-btn').addEventListener('click', () => {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        currentAgent = document.getElementById('agent-input').value.trim().toUpperCase() || "UNKNOWN";
        wandCore = document.getElementById('wand-core').value;
        intelDatabase = JSON.parse(localStorage.getItem(`wizardIntel_${currentAgent}`)) || [];
        capturesCount = intelDatabase.length;
        
        document.getElementById('agent-name-display').innerText = `Auror: ${currentAgent}`;
        document.getElementById('agent-rank-display').innerText = `Rank: ${getRank(capturesCount)} | Captures: ${capturesCount}`;
        
        const savedWanted = localStorage.getItem(`wantedTarget_${currentAgent}`);
        if(savedWanted) document.getElementById('wanted-name').innerText = savedWanted;
        else setWantedTarget();

        document.getElementById('profile-screen').style.display = 'none';
        document.getElementById('briefing-screen').style.display = 'flex';
        typeWriter();
    });

    // Typewriter Briefing
    const briefingString = "DEPARTMENT OF MAGICAL LAW ENFORCEMENT\n\nDirective 42:\nDark Wizards are currently operating under Muggle guise in your vicinity.\n\nYour orders:\nUse Revelio to expose their true nature.\n\nSpeak 'Lumos' to illuminate dark areas. Speak 'I solemnly swear that I am up to no good' to view the Map.\n\nIf a duel initiates, match their aura color. You may tap the screen, swipe (Up/Right/Down), or shout 'Expelliarmus' (Red), 'Impedimenta' (Green), or 'Stupefy' (Blue).\n\nConstant Vigilance.";
    let typeIndex = 0;
    function typeWriter() {
        if (typeIndex < briefingString.length) {
            document.getElementById('briefing-text').innerHTML += briefingString.charAt(typeIndex) === '\n' ? '<br>' : briefingString.charAt(typeIndex);
            typeIndex++;
            if(typeIndex % 3 === 0) playSound('whoosh'); 
            setTimeout(typeWriter, 30);
        } else document.getElementById('accept-btn').style.display = 'block';
    }

    document.getElementById('accept-btn').addEventListener('click', () => {
        requestOrientation();
        if(recognition) { try { recognition.start(); } catch(e){} }
        document.getElementById('briefing-screen').style.display = 'none';
        document.getElementById('video-container').style.display = 'block';
        navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}}).then(s => video.srcObject = s).catch(e => { statusText.innerText = "Magical Interference Detected"; });
    });

    // --- MARAUDER's MAP LOGIC ---
    // If voice fails, double tap the wanted button to open map
    document.getElementById('wanted-btn').addEventListener('dblclick', openMap);
    
    function openMap() {
        document.getElementById('map-screen').style.display = 'flex';
        mapContent.innerHTML = '<div style="position:absolute; width:15px; height:15px; background:#5c0011; border-radius:50%; box-shadow: 0 0 10px #5c0011;"></div>'; // You are here
        
        let numPrints = wandCore === 'unicorn' ? 6 : 3;
        for(let i=0; i<numPrints; i++) {
            let p = document.createElement('div');
            p.className = 'footprints';
            p.innerText = "👣 " + data_names[Math.floor(Math.random()*data_names.length)];
            p.style.top = (Math.random() * 150 + 25) + "vh";
            p.style.left = (Math.random() * 150 + 25) + "vw";
            mapContent.appendChild(p);
            
            setInterval(() => {
                p.style.top = (parseFloat(p.style.top) + (Math.random()*10 - 5)) + "vh";
                p.style.left = (parseFloat(p.style.left) + (Math.random()*10 - 5)) + "vw";
            }, 2500);
        }
    }
    document.getElementById('close-map-btn').addEventListener('click', () => { document.getElementById('map-screen').style.display = 'none'; });

    // --- LIVE DUEL MECHANICS ---
    let particlesList = [];
    function animateParticles() {
        ctxParticles.clearRect(0,0, particleCanvas.width, particleCanvas.height);
        for(let i=particlesList.length-1; i>=0; i--) {
            let p = particlesList[i];
            p.x += p.vx; p.y += p.vy; p.life -= 0.03;
            if(p.life <= 0) { particlesList.splice(i, 1); continue; }
            ctxParticles.globalAlpha = p.life; ctxParticles.fillStyle = p.color;
            ctxParticles.beginPath(); ctxParticles.arc(p.x, p.y, p.size, 0, Math.PI*2); ctxParticles.fill();
        }
        ctxParticles.globalAlpha = 1.0;
        requestAnimationFrame(animateParticles);
    }
    animateParticles();

    scanBtn.addEventListener('click', () => {
        initAudio(); scanBtn.disabled = true; statusText.innerText = "Casting Revelio..."; 
        statusText.classList.remove('muggle-active');
        
        // Reveal Mist Animation
        revelioMist.classList.add('mist-active');
        playSound('whoosh');

        setTimeout(() => {
            revelioMist.classList.remove('mist-active');
            const isWizard = forceWizard || (Math.random() < 0.20); forceWizard = false; 

            if (isWizard) {
                startDuel(); 
            } else {
                statusText.innerText = "No Trace - Standard Muggle"; 
                statusText.classList.add('muggle-active');
                setTimeout(() => { 
                    statusText.innerText = lumosActive ? "Lumos Maxima" : "Trace Charm Active"; 
                    statusText.classList.remove('muggle-active');
                    scanBtn.disabled = false; 
                }, 2500);
            }
        }, 1500); 
    });

    function startDuel() {
        document.getElementById('ui-layer').style.display = 'none'; 
        duelLayer.style.display = 'flex'; 
        successfulCounters = 0;
        secondChanceUsed = false;
        
        if (isBoss || capturesCount > 0 && capturesCount % 10 === 0) {
            requiredCounters = 6;
            document.getElementById('duel-title').innerText = "ELITE BOSS! PREPARE TO PASS WAND!";
            document.getElementById('duel-title').style.color = "#ff00ff";
        } else {
            requiredCounters = 3;
            document.getElementById('duel-title').innerText = "Defend Yourself!";
            document.getElementById('duel-title').style.color = "#ff3333";
        }
        playSound('dark_alert');
        setTimeout(wizardAttack, 1000); 
    }

    function wizardAttack() {
        currentWizardColor = spellColors[Math.floor(Math.random() * spellColors.length)];
        wizardAura.style.color = currentWizardColor;
        wizardAura.style.opacity = '1';
        playSound('whoosh');
    }

    window.castCounterSpell = function(playerColor) {
        if (wizardAura.style.opacity === '0') return; 
        playSound('zap');
        
        let count = wandCore === 'dragon' ? 80 : 40;
        for(let i=0; i<count; i++) {
            particlesList.push({
                x: window.innerWidth/2, y: window.innerHeight - 150,
                vx: (Math.random()-0.5)*15, vy: (Math.random()*-20)-5,
                life: 1.0, color: playerColor, size: Math.random()*6+3
            });
        }
        
        setTimeout(() => {
            if (playerColor === currentWizardColor) {
                successfulCounters++;
                wizardAura.style.opacity = '0'; 
                playSound('clash');
                
                document.getElementById('duel-flash').style.opacity = '0.8';
                setTimeout(() => document.getElementById('duel-flash').style.opacity = '0', 100);

                if (requiredCounters === 6 && successfulCounters === 3) {
                    document.getElementById('duel-title').innerText = "WAND OVERHEATING! PASS TO ANOTHER AUROR!";
                    setTimeout(wizardAttack, 3000); 
                    return;
                }

                if (successfulCounters >= requiredCounters) winDuel();
                else {
                    document.getElementById('duel-title').innerText = `Blocked! (${successfulCounters}/${requiredCounters})`;
                    document.getElementById('duel-title').style.color = "#4dff4d";
                    setTimeout(wizardAttack, 800); 
                }
            } else {
                if(wandCore === 'phoenix' && !secondChanceUsed) {
                    secondChanceUsed = true;
                    document.getElementById('duel-title').innerText = "PHOENIX TEARS SAVED YOU! TRY AGAIN!";
                    setTimeout(wizardAttack, 1500);
                } else loseDuel();
            }
        }, 200); 
    };

    function winDuel() {
        try {
            generateAzkabanMugshot();
        } catch (e) {
            console.error("Camera fail, using fallback", e);
            // In case videoWidth is 0 (camera paused), we fallback safely so it doesn't hang
            document.getElementById('proof-image').src = ""; 
        }
        
        playSound('capture');
        duelLayer.style.display = 'none';
        document.getElementById('ui-layer').style.display = 'flex';
        wizardAura.style.opacity = '0';
        
        document.getElementById('proof-screen').style.display = 'flex';
        
        // Update counters before they dismiss
        successfulCounters = 3; 
        document.getElementById('duel-title').innerText = `Blocked! (3/3)`;
        isBoss = false; 
    }

    function loseDuel() {
        playSound('escape');
        document.getElementById('video-container').classList.add('shake');
        document.getElementById('cracked-glass').style.display = 'block';
        document.getElementById('duel-title').innerText = "Apparated Away!";
        wizardAura.style.opacity = '0';
        
        setTimeout(() => {
            document.getElementById('video-container').classList.remove('shake');
            document.getElementById('cracked-glass').style.display = 'none';
            duelLayer.style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            statusText.innerText = "Target Lost";
            setTimeout(() => { statusText.innerText = lumosActive ? "Lumos Maxima" : "Trace Charm Active"; scanBtn.disabled = false; }, 2000);
        }, 1500);
    }

    // --- AZKABAN MUGSHOT GENERATOR ---
    function wrapText(context, text, x, y, maxWidth, lineHeight) {
        const words = text.split(' '); let line = '';
        for(let n = 0; n < words.length; n++) {
            const testLine = line + words[n] + ' '; const metrics = context.measureText(testLine);
            if (metrics.width > maxWidth && n > 0) {
                context.strokeText(line, x, y); context.fillText(line, x, y);
                line = words[n] + ' '; y += lineHeight;
            } else line = testLine;
        }
        context.strokeText(line, x, y); context.fillText(line, x, y); return y + lineHeight; 
    }

    function generateAzkabanMugshot() {
        const c = document.getElementById('canvas-processor');
        c.width = video.videoWidth || 640; c.height = video.videoHeight || 480;
        const w = c.width, h = c.height;
        
        // Base Feed & Newspaper Filter
        ctx.filter = 'sepia(100%) contrast(140%) grayscale(20%) brightness(85%)';
        if(video.videoWidth > 0) ctx.drawImage(video, 0, 0, w, h);
        else { ctx.fillStyle="#443322"; ctx.fillRect(0,0,w,h); } // Fallback if cam fails
        ctx.filter = 'none'; 
        
        // Iron Bars
        const gap = Math.floor(w / 5);
        for(let i = gap/2; i < w; i += gap) {
            ctx.fillStyle = "#111"; ctx.fillRect(i, 0, Math.floor(w*0.05), h);
        }
        
        // Info Plaque
        ctx.fillStyle = "#e8dcc4"; ctx.fillRect(w*0.05, h*0.65, w*0.9, h*0.3); 
        ctx.strokeStyle = "#5c0011"; ctx.lineWidth = 3; ctx.strokeRect(w*0.05+5, h*0.65+5, w*0.9-10, h*0.3-10);
        
        ctx.fillStyle = "#1a1110"; ctx.font = `bold ${Math.floor(h*0.04)}px serif`; 
        
        let targetName = parentTarget ? parentTarget : data_names[Math.floor(Math.random() * data_names.length)];
        let isWanted = (targetName === localStorage.getItem(`wantedTarget_${currentAgent}`));
        parentTarget = ""; 
        
        if (isWanted) {
            ctx.save(); ctx.translate(w/2, h*0.2); ctx.rotate(-0.2);
            ctx.fillStyle = "rgba(0, 120, 0, 0.9)"; ctx.font = `bold ${Math.floor(h*0.08)}px serif`;
            ctx.textAlign="center"; ctx.fillText("BOUNTY CLAIMED", 0, 0); ctx.restore();
            setWantedTarget();
        }

        ctx.fillText(`ALIAS: ${targetName}`, w*0.1, h*0.72); 
        ctx.fillText(`CRIME: ${data_crimes[Math.floor(Math.random() * data_crimes.length)]}`, w*0.1, h*0.8); 

        document.getElementById('proof-image').dataset.tempImageData = c.toDataURL('image/jpeg', 0.8);
        document.getElementById('proof-image').src = document.getElementById('proof-image').dataset.tempImageData;
    }

    // Modal Triggers
    document.getElementById('dismiss-btn').addEventListener('click', () => {
        intelDatabase.unshift(document.getElementById('proof-image').dataset.tempImageData); 
        localStorage.setItem(`wizardIntel_${currentAgent}`, JSON.stringify(intelDatabase));
        capturesCount = intelDatabase.length;
        document.getElementById('agent-rank-display').innerText = `Rank: ${getRank(capturesCount)} | Core: ${wandCore}`;
        document.getElementById('proof-screen').style.display = 'none';
        scanBtn.disabled = false; statusText.innerText = lumosActive ? "Lumos Maxima" : "Trace Charm Active";
    });

    document.getElementById('wanted-btn').addEventListener('click', () => { document.getElementById('wanted-screen').style.display = 'flex'; });
    document.getElementById('close-wanted-btn').addEventListener('click', () => { document.getElementById('wanted-screen').style.display = 'none'; });

    document.getElementById('gallery-btn').addEventListener('click', () => {
        const grid = document.getElementById('gallery-grid'); grid.innerHTML = '';
        intelDatabase.forEach(imgSrc => {
            const img = document.createElement('img'); img.src = imgSrc; img.style.width = "100%"; img.style.border = "2px solid #1a1110";
            grid.appendChild(img);
        });
        document.getElementById('gallery-screen').style.display = 'flex';
    });
    document.getElementById('close-gallery-btn').addEventListener('click', () => document.getElementById('gallery-screen').style.display = 'none');
    document.getElementById('logout-btn').addEventListener('click', () => {
        document.getElementById('gallery-screen').style.display = 'none';
        document.getElementById('video-container').style.display = 'none';
        document.getElementById('agent-input').value = "";
        document.getElementById('profile-screen').style.display = 'flex';
    });

    // Secret Minister Menu
    let menuTaps = 0;
    statusText.addEventListener('click', () => {
        menuTaps++;
        if (menuTaps >= 5) {
            menuTaps = 0;
            let pwd = prompt("Enter Minister Password:");
            if (pwd && pwd.toLowerCase() === "alohomora") {
                parentTarget = prompt("Enter specific name for next scan (or leave blank):");
                isBoss = confirm("Trigger Co-Op Boss Battle on next scan?");
                alert("Mischief Managed.");
            }
        }
    });

</script>
